<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="theme-color" content="#0f1419">
<title>후드사진</title>
<link rel="manifest" href="./manifest.json">
<link rel="icon" href="./icon-192.png">
<link rel="apple-touch-icon" href="./icon-192.png">
<style>
  :root{
    --bg:#0f1419; --card:#1a2230; --card2:#223046; --line:#2e3d55;
    --txt:#eaf0f8; --sub:#8fa3bf; --acc:#3b82f6; --ok:#22c55e; --warn:#f59e0b; --del:#ef4444;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  body{margin:0; background:var(--bg); color:var(--txt); font-family:'Malgun Gothic',system-ui,sans-serif;}
  .view{max-width:560px; margin:0 auto; padding:12px 12px 90px;}
  h1{font-size:20px; margin:6px 0 2px;}
  .sub{color:var(--sub); font-size:13px; margin-bottom:10px;}
  .banner{background:#7c2d12; color:#fde68a; padding:8px 10px; border-radius:8px; font-size:13px; margin-bottom:10px; display:none;}
  .installbar{display:none; background:#173054; border:1px solid var(--acc); color:#cfe3ff; padding:10px; border-radius:10px; font-size:14px; margin-bottom:10px;}
  .installbar button{float:right; background:var(--acc); border:none; color:#fff; padding:8px 14px; border-radius:8px; font-size:14px; font-weight:bold; margin-top:-4px;}
  .card{background:var(--card); border:1px solid var(--line); border-radius:12px; padding:12px; margin-bottom:12px;}
  .row{display:flex; gap:8px; margin-bottom:8px;}
  .row:last-child{margin-bottom:0;}
  label{font-size:12px; color:var(--sub); display:block; margin-bottom:3px;}
  input[type=text],input[type=number]{
    width:100%; padding:10px; font-size:16px; border-radius:8px;
    border:1px solid var(--line); background:var(--card2); color:var(--txt);
  }
  .foldername{font-size:14px; color:var(--ok); margin-top:8px; word-break:break-all;}
  #homeView .row{margin-bottom:6px;}
  #homeView input[type=text],#homeView input[type=number]{padding:7px; font-size:15px;}
  #homeView .foldername{margin-top:6px; font-size:13px;}
  .grid{display:grid; grid-template-columns:repeat(3,1fr); gap:8px;}
  .fbtn{
    position:relative; background:var(--card); border:1px solid var(--line); color:var(--txt);
    border-radius:12px; padding:16px 6px; font-size:15px; text-align:center; cursor:pointer;
  }
  .fbtn.wide{grid-column:1/-1; padding:14px; font-size:16px;}
  .fbtn.has{border-color:var(--ok); background:#14301f;}
  .badge{
    position:absolute; top:6px; right:6px; min-width:22px; height:22px; line-height:22px;
    background:var(--acc); border-radius:11px; font-size:12px; padding:0 5px; display:none;
  }
  .fbtn.has .badge{display:block; background:var(--ok); color:#06250f; font-weight:bold;}
  #homeView .badge{position:static; top:auto; right:auto; margin-top:3px; height:auto; line-height:1.3; min-width:0;}
  .bottom{
    position:fixed; left:0; right:0; bottom:0; background:#0b0f14ee; border-top:1px solid var(--line);
    display:flex; gap:8px; padding:10px 12px; max-width:584px; margin:0 auto;
  }
  .btn{flex:1; padding:14px 8px; font-size:16px; border:none; border-radius:10px; cursor:pointer; color:#fff; font-weight:bold;}
  .bottom .btn{padding:7px 5px; font-size:13px; border-radius:8px;}
  .btn.blue{background:var(--acc);} .btn.green{background:var(--ok); color:#06250f;}
  .btn.gray{background:#374151;} .btn.red{background:var(--del);} .btn.warn{background:var(--warn); color:#3b2300;}
  /* 폴더 화면 */
  .fhead{display:flex; align-items:center; gap:10px; margin:4px 0 10px;}
  .back{background:var(--card2); border:1px solid var(--line); color:var(--txt); border-radius:10px; padding:10px 14px; font-size:16px;}
  .ftitle{font-size:18px; font-weight:bold;}
  .fcount{color:var(--ok); font-size:14px;}
  .hint{font-size:13px; color:var(--warn); margin-bottom:10px; line-height:1.5;}
  .gal{width:100%; padding:12px; font-size:14px; border:1px solid var(--line); border-radius:10px; background:var(--card); color:var(--sub); margin-bottom:12px;}
  .thumbs{display:grid; grid-template-columns:repeat(3,1fr); gap:8px;}
  .th{position:relative; border-radius:10px; overflow:hidden; border:1px solid var(--line); aspect-ratio:4/3; background:#000; -webkit-user-select:none; user-select:none; -webkit-touch-callout:none;}
  .th img{width:100%; height:100%; object-fit:cover; -webkit-user-drag:none;}
  .th .no{position:absolute; left:4px; top:4px; background:#000a; padding:2px 7px; border-radius:6px; font-size:13px; font-weight:bold;}
  .th .del{position:absolute; right:4px; top:4px; background:var(--del); border:none; color:#fff; width:30px; height:30px; border-radius:8px; font-size:15px;}
  .th .blur{position:absolute; left:4px; bottom:4px; background:var(--del); color:#fff; padding:2px 6px; border-radius:6px; font-size:12px; font-weight:bold;}
  /* ───── 내장 카메라 (전체화면 프리뷰 + 반투명 컨트롤) ───── */
  .camview{position:fixed; inset:0; background:#000; display:none; flex-direction:column; z-index:80;}
  .camtop{
    display:flex; align-items:center; gap:6px; padding:8px;
    background:rgba(0,0,0,.28); position:absolute; top:0; left:0; right:0; z-index:82;
  }
  .camtop .cbtn{background:#00000055; border:1px solid #ffffff33; color:#fff; border-radius:10px; padding:9px 11px; font-size:15px;}
  .camtitle{flex:1; text-align:center; font-size:15px; font-weight:bold; color:#fff; text-shadow:0 1px 3px #000;}
  .camcnt{color:var(--ok); font-weight:bold;}
  #camVideo{position:absolute; inset:0; width:100%; height:100%; object-fit:cover; z-index:81;}
  .camzoom{
    position:absolute; top:54px; left:0; right:0; z-index:82;
    display:flex; gap:6px; justify-content:center; flex-wrap:wrap; padding:4px 8px;
  }
  .zbtn{background:#00000066; border:1px solid #ffffff44; color:#fff; border-radius:16px; padding:7px 12px; font-size:14px; text-shadow:0 1px 2px #000;}
  .zbtn.on{background:var(--acc); border-color:var(--acc); font-weight:bold;}
  .zbtn.dim{opacity:.4;}
  .zbtn.alt{background:#00000044;}
  .cambottom{
    position:absolute; left:0; right:0; bottom:0; z-index:82; background:rgba(0,0,0,.22);
    display:flex; align-items:center; justify-content:space-between; padding:12px 22px calc(12px + env(safe-area-inset-bottom));
  }
  .lastth{width:54px; height:54px; border-radius:10px; border:2px solid #fff7; object-fit:cover; background:#222;}
  .shutter{width:78px; height:78px; border-radius:50%; border:5px solid #fff; background:#ffffff44;}
  .shutter:active{background:#fff;}
  .camside{width:54px; display:flex; flex-direction:column; gap:8px; align-items:center;}
  .camui{position:absolute; inset:0; z-index:82; pointer-events:none;}
  .camui>*{pointer-events:auto;}
  .flashfx{position:fixed; inset:0; background:#fff; opacity:0; pointer-events:none; z-index:90; transition:opacity .12s;}
  /* 오버레이/진행/토스트 */
  .overlay{position:fixed; inset:0; background:#000d; display:none; flex-direction:column; align-items:center; justify-content:center; gap:14px; padding:24px; z-index:50;}
  .overlay .msg{font-size:20px; color:var(--ok); font-weight:bold;}
  .overlay .cnt{font-size:15px; color:var(--sub);}
  .overlay .btn{flex:none; width:100%; max-width:380px; padding:20px; font-size:20px;}
  .prog{position:fixed; inset:0; background:#000c; display:none; align-items:center; justify-content:center; z-index:60;}
  .pbox{background:var(--card); border:1px solid var(--line); border-radius:14px; padding:22px; width:84%; max-width:360px; text-align:center;}
  .pbar{height:12px; background:var(--card2); border-radius:6px; overflow:hidden; margin-top:12px;}
  .pfill{height:100%; width:0%; background:var(--ok);}
  .toast{
    position:fixed; bottom:96px; left:50%; transform:translateX(-50%); background:#111c; color:#fff;
    padding:10px 18px; border-radius:20px; font-size:14px; display:none; z-index:95; white-space:nowrap;
  }
</style>
</head>
<body>

<!-- ───────── 홈 화면 ───────── -->
<div class="view" id="homeView">
  <h1 style="font-size:18px;margin:4px 0;"><span style="position:relative;display:inline-block">📷<span style="position:absolute;left:-1px;top:-3px;font-size:9px;font-weight:bold;color:var(--acc);background:#000a;padding:0 2px;border-radius:3px;line-height:1.2;">v55</span></span> 후드사진 · 촬영하면 자동 분류 · 총 <b id="totalCnt">0</b>장</h1>
  <div class="installbar" id="installBar">📲 이 앱을 폰에 설치할 수 있습니다 <button onclick="doInstall()">앱 설치</button></div>
  <div class="banner" id="storeBanner">⚠ 이 브라우저는 임시저장이 안 됩니다. 내보내기 전에 화면을 닫지 마세요.</div>

  <div class="card">
    <div class="row" style="align-items:center">
      <div style="display:flex;align-items:center;gap:4px;flex:0 0 auto"><label style="margin:0;white-space:nowrap">번호</label><input type="text" id="schNum" placeholder="27" style="width:64px"></div>
      <div style="display:flex;align-items:center;gap:4px;flex:1"><label style="margin:0;white-space:nowrap">학교명</label><input type="text" id="schName" placeholder="오금초등학교" style="flex:1;min-width:0"><button id="gpsBtn" onclick="gpsFill(false)" style="flex:0 0 auto;padding:6px 9px;border:none;border-radius:8px;background:#0ea5e9;color:#fff;font-weight:bold;font-size:15px;">📍</button></div>
    </div>
    <div class="row" style="align-items:center">
      <div style="display:flex;align-items:center;gap:4px;flex:1"><label style="margin:0;white-space:nowrap">점검종류</label><input type="text" id="schType" list="schTypeList" placeholder="(선택) 월점검 / 실사 / 사전점검 / 성능점검" style="flex:1;min-width:0"></div>
      <datalist id="schTypeList"><option value="월점검"></option><option value="실사"></option><option value="사전점검"></option><option value="성능점검"></option></datalist>
    </div>
    <div class="row" style="flex-wrap:nowrap;align-items:center">
      <div style="flex:1;display:flex;align-items:center;gap:3px"><input type="number" id="schM" style="flex:1;min-width:0"><label style="margin:0">월</label></div>
      <div style="flex:1;display:flex;align-items:center;gap:3px"><input type="number" id="schD" style="flex:1;min-width:0"><label style="margin:0">일</label></div>
      <div style="flex:1;display:flex;align-items:center;gap:3px"><input type="number" id="schH" style="flex:1;min-width:0"><label style="margin:0">시</label></div>
      <div style="flex:1;display:flex;align-items:center;gap:3px"><input type="number" id="schMin" style="flex:1;min-width:0"><label style="margin:0">분</label></div>
    </div>
  <button id="fsSessBtn" onclick="fsSessToggle()" style="width:100%;margin-top:6px;padding:11px 8px;border:none;border-radius:10px;background:#2563eb;color:#fff;font-size:14px;font-weight:bold;line-height:1.3;">▶ 사진저장 시작 (폴더 고정)</button>
  <div id="gpsPick" style="display:none;margin-top:8px;"></div>
  <div class="foldername" id="folderPreview" style="display:none"></div>
  <div id="fsPathRow" onclick="fsOpenFolder()" style="margin-top:6px;padding:8px 10px;border-radius:8px;background:#0f172a;border:1px dashed #4b5563;font-size:13.5px;line-height:1.4;word-break:break-all;text-align:center;"></div>
  </div>

  <div id="homeStatus" style="font-size:13px;color:var(--sub);margin-bottom:6px;"></div>
  <div class="grid" id="folderGrid"></div>

  <div class="bottom">
    <button class="btn" style="background:#3b82f6;font-size:13px;white-space:nowrap;" onclick="homeImport()">📥 사진불러오기</button>
    <button class="btn red" onclick="resetAll()">전체삭제</button>
    <button class="btn green" onclick="lsMenu()">📡 노트북</button>
  </div>
</div>

<!-- ───────── 폴더 화면 ───────── -->
<div class="view" id="folderView" style="display:none;padding-bottom:210px">
  <div class="fhead">
    <button class="back" onclick="goHome()">← 뒤로</button>
    <button class="back" onclick="folderMove(-1)">◀</button>
    <div style="flex:1;text-align:center;">
      <span class="ftitle" id="fTitle"></span> <span class="fcount"><span id="fCnt">0</span>장</span>
    </div>
    <button class="back" onclick="folderMove(1)">▶</button>
  </div>
  <div class="hint" id="fHint"></div>
  <div class="thumbs" id="thumbs"></div>
  <div class="bottom" style="flex-direction:column;gap:8px;">
    <div id="delBar" style="display:none;width:100%;">
      <div style="text-align:center;color:#fbbf24;font-size:12px;font-weight:bold;margin-bottom:6px;">길게 누른 사진 → 다른 사진을 누르면 그 사이 전체 선택</div>
      <div style="display:flex;gap:6px;">
        <button onclick="delSelected()" style="flex:2;padding:13px 2px;font-size:15px;font-weight:bold;border:none;border-radius:8px;background:#ef4444;color:#fff;">🗑 <span id="delCnt">0</span>장 삭제</button>
        <button onclick="selAll()" style="flex:1;padding:13px 2px;font-size:14px;font-weight:bold;border:none;border-radius:8px;background:#374151;color:#fff;">전체선택</button>
        <button onclick="exitDelMode()" style="flex:1;padding:13px 2px;font-size:14px;font-weight:bold;border:none;border-radius:8px;background:#6b7280;color:#fff;">취소</button>
      </div>
    </div>
    <div id="reorderBar" style="width:100%;">
      <button id="reorderToggle" onclick="toggleReorder()" style="width:100%;padding:9px;font-size:14px;font-weight:bold;border:none;border-radius:10px;background:#374151;color:#fff;">↕ 순서변경 (꺼짐)</button>
      <div id="reorderBtns" style="display:none;margin-top:8px;">
        <div style="display:flex;gap:6px;">
          <button onclick="reorderSel('first')" style="flex:1;padding:12px 2px;font-size:14px;font-weight:bold;border:none;border-radius:8px;background:#2563eb;color:#fff;">⏮맨앞</button>
          <button onclick="reorderSel('up')" style="flex:1;padding:12px 2px;font-size:14px;font-weight:bold;border:none;border-radius:8px;background:#3b82f6;color:#fff;">◀앞으로</button>
          <button onclick="reorderSel('down')" style="flex:1;padding:12px 2px;font-size:14px;font-weight:bold;border:none;border-radius:8px;background:#3b82f6;color:#fff;">뒤로▶</button>
          <button onclick="reorderSel('last')" style="flex:1;padding:12px 2px;font-size:14px;font-weight:bold;border:none;border-radius:8px;background:#2563eb;color:#fff;">맨뒤⏭</button>
        </div>
        <button onclick="moveSel()" style="width:100%;margin-top:6px;padding:12px;font-size:14px;font-weight:bold;border:none;border-radius:8px;background:#9333ea;color:#fff;">📁 다른 폴더로 이동</button>
      </div>
    </div>
    <div style="display:flex;gap:8px;width:100%">
      <button class="btn gray" style="flex:0 0 22%" onclick="goHome()">← 폴더</button>
      <button class="btn warn" style="flex:0 0 36%" onclick="phoneCam()">📷 폰카메라</button>
      <button class="btn blue" onclick="openCamera()">📷 고속촬영</button>
    </div>
  </div>
</div>

<!-- ───────── 내장 카메라 (연속촬영) ───────── -->
<div class="camview" id="camView">
  <video id="camVideo" playsinline autoplay muted></video>
  <div class="camui" id="camUI">
  <div class="camtop">
    <button class="cbtn" onclick="closeCam()">✕ 닫기</button>
    <button class="cbtn" onclick="camMove(-1)">◀</button>
    <div class="camtitle"><span id="camFolder"></span> · <span class="camcnt" id="camCnt">0</span>장</div>
    <button class="cbtn" onclick="camMove(1)">▶</button>
    <button class="cbtn" id="torchBtn" style="display:none" onclick="toggleTorch()">🔦</button>
  </div>
  <div class="camzoom" id="camZoom"></div>
  <div class="cambottom">
    <img class="lastth" id="lastTh" alt="">
    <button class="shutter" id="shutterBtn" onclick="snap()"></button>
    <div class="camside" id="camSide">
      <button class="cbtn" id="revBtn" onclick="toggleReview()" style="font-size:12px;white-space:nowrap">👁2초ON</button>
      <button class="cbtn" id="stabBtn" onclick="toggleStab()" style="font-size:12px;white-space:nowrap">✋안정ON</button>
      <button class="cbtn" onclick="delLast()" style="font-size:12px;white-space:nowrap;background:#7f1d1dd9">🗑직전</button>
    </div>
  </div>
  </div>
</div>
<div class="flashfx" id="flashFx"></div>

<!-- 기본카메라(예비) 촬영 후 오버레이 -->
<div class="overlay" id="overlay">
  <div class="msg">✓ 저장됨</div>
  <div class="cnt" id="ovInfo"></div>
  <button class="btn blue" onclick="hideOverlay(); openCamera();">📷 다음 사진 촬영</button>
  <button class="btn gray" onclick="hideOverlay()">그만 (목록 보기)</button>
</div>

<!-- 진행률 -->
<div class="prog" id="prog">
  <div class="pbox">
    <div id="progMsg">ZIP 만드는 중…</div>
    <div class="pbar"><div class="pfill" id="pfill"></div></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<input type="file" id="camInput" accept="image/*" capture="environment" style="display:none">
<input type="file" id="galInput" accept="image/*" multiple style="display:none">

<script>
'use strict';
/* ───────── 폴더 정의 ───────── */
const FOLDERS = [{id:'doc', label:'📋 점검기록지 (수기 기록지)', short:'점검기록지', wide:true},
                 {id:'base', label:'🏫 기본 사진 (급식실 전경·스티커)', short:'기본 사진', wide:true}];
for (let i=1;i<=15;i++) FOLDERS.push({id:'h'+i, label:'후드'+i, short:'후드'+i});
const FLABEL={}, FSHORT={}, FIDS=[];
FOLDERS.forEach(f=>{FLABEL[f.id]=f.label; FSHORT[f.id]=f.short; FIDS.push(f.id);});

let photos = [];          // {id, fid, ts, seq, blob}
let seqCounter = 1;
let curFolder = null;
let db = null, idbOK = false;
const thumbURL = {};

/* ───────── IndexedDB ───────── */
function openDB(){
  return new Promise(res=>{
    try{
      const rq = indexedDB.open('gimsil_photo_app', 1);
      rq.onupgradeneeded = ()=>{ rq.result.createObjectStore('photos', {keyPath:'id'}); };
      rq.onsuccess = ()=>{ db=rq.result; idbOK=true; res(true); };
      rq.onerror   = ()=>res(false);
      rq.onblocked = ()=>res(false);
    }catch(e){ res(false); }
  });
}
function idbPut(rec){ if(!idbOK) return; try{ db.transaction('photos','readwrite').objectStore('photos').put(rec); }catch(e){} }
function idbDel(id){ if(!idbOK) return; try{ db.transaction('photos','readwrite').objectStore('photos').delete(id); }catch(e){} }
function idbDelMany(ids){ if(!idbOK||!ids.length) return; try{ const st=db.transaction('photos','readwrite').objectStore('photos'); ids.forEach(id=>st.delete(id)); }catch(e){} }
function idbPutMany(recs){ if(!idbOK||!recs.length) return; try{ const st=db.transaction('photos','readwrite').objectStore('photos'); recs.forEach(r=>st.put(r)); }catch(e){} }
function idbClear(){ if(!idbOK) return; try{ db.transaction('photos','readwrite').objectStore('photos').clear(); }catch(e){} }
function idbLoadAll(){
  return new Promise(res=>{
    if(!idbOK) return res([]);
    try{
      const rq = db.transaction('photos','readonly').objectStore('photos').getAll();
      rq.onsuccess = ()=>res(rq.result||[]); rq.onerror = ()=>res([]);
    }catch(e){ res([]); }
  });
}

/* ───────── 학교 정보 ───────── */
const $ = id=>document.getElementById(id);
function loadMeta(){
  let m = {};
  try{ m = JSON.parse(localStorage.getItem('school_meta')||'{}'); }catch(e){}
  const now = new Date();
  $('schNum').value  = m.num  ?? '';
  $('schName').value = m.name ?? '';
  if($('schType')) $('schType').value = m.ty ?? '';
  $('schM').value = now.getMonth()+1;
  $('schD').value = now.getDate();
  $('schH').value = now.getHours();
  $('schMin').value = now.getMinutes();
}
function saveMeta(){
  const m = {num:$('schNum').value, name:$('schName').value, ty:($('schType')?$('schType').value:''), m:$('schM').value, d:$('schD').value, h:$('schH').value, min:$('schMin').value};
  try{ localStorage.setItem('school_meta', JSON.stringify(m)); }catch(e){}
  $('folderPreview').textContent = '폴더명: ' + schoolFolderName();
}
function schoolFolderName(){
  const num = $('schNum').value.trim();
  const name = $('schName').value.trim() || '학교명미입력';
  const ty = ($('schType') && $('schType').value.trim()) ? '_'+$('schType').value.trim() : '';

/* ───────── GPS 학교 자동입력 ───────── */
function gpsDist(la1,lo1,la2,lo2){const R=6371000,t=Math.PI/180,d1=(la2-la1)*t,d2=(lo2-lo1)*t,a=Math.sin(d1/2)**2+Math.cos(la1*t)*Math.cos(la2*t)*Math.sin(d2/2)**2;return 2*R*Math.asin(Math.sqrt(a));}
function gpsApply(s){ $('schNum').value=s[0]; $('schName').value=s[1]; if(typeof saveMeta==='function') saveMeta(); }
function gpsShowPick(list){
  const box=$('gpsPick'); if(!box) return; box.innerHTML='';
  if(list.length<2){ box.style.display='none'; return; }
  const t=document.createElement('div'); t.style.cssText='font-size:15px;color:var(--warn);font-weight:bold;margin-bottom:6px;'; t.textContent='가까운 학교가 여러 곳입니다 — 해당 학교를 누르세요:';
  box.appendChild(t);
  list.forEach(r=>{ const b=document.createElement('button');
    b.style.cssText='display:block;width:100%;text-align:left;margin-bottom:6px;padding:14px;font-size:17px;border:2px solid var(--acc);border-radius:10px;background:var(--card2);color:var(--txt);';
    b.textContent=r.s[0]+'   '+r.s[1]+'   ('+Math.round(r.d)+'m)';
    b.onclick=()=>{ gpsApply(r.s); box.style.display='none'; if(typeof toast==='function') toast('선택: '+r.s[1]); };
    box.appendChild(b); });
  box.style.display='block';
}
let gpsBusy=false;
function gpsFill(auto){
  if(gpsBusy) return;
  if(!navigator.geolocation){ if(!auto&&typeof toast==='function') toast('이 기기는 위치를 지원하지 않습니다'); return; }
  gpsBusy=true; if(!auto&&typeof toast==='function') toast('📍 현재 위치 확인 중…');
  navigator.geolocation.getCurrentPosition(function(pos){
    gpsBusy=false;
    const la=pos.coords.latitude, lo=pos.coords.longitude;
    const ranked=SCHOOLS.map(s=>({s:s,d:gpsDist(la,lo,s[2],s[3])})).sort((a,b)=>a.d-b.d);
    if(!ranked.length || ranked[0].d>3000){ if(!auto&&typeof toast==='function') toast('근처에 등록된 학교가 없습니다(수동 입력하세요)'); const bx=$('gpsPick'); if(bx) bx.style.display='none'; return; }
    gpsApply(ranked[0].s);
    const near=ranked.filter(r=>r.d<=250);
    if(near.length>1){ gpsShowPick(near); if(typeof toast==='function') toast('가까운 학교 '+near.length+'곳 — 아래에서 선택'); }
    else{ const bx=$('gpsPick'); if(bx) bx.style.display='none'; if(typeof toast==='function') toast('자동입력: '+ranked[0].s[1]+' ('+Math.round(ranked[0].d)+'m)'); }
  }, function(err){ gpsBusy=false; if(!auto&&typeof toast==='function') toast('위치 사용 불가('+((err&&err.message)||'')+') — 수동 입력하세요'); },
  {enableHighAccuracy:true, timeout:12000, maximumAge:30000});
}

const THUMB_W = 360;
async function makeThumb(blob){
  try{
    const bmp = await createImageBitmap(blob);
    const sc = Math.min(1, THUMB_W/bmp.width);
    const w = Math.max(1,Math.round(bmp.width*sc)), h = Math.max(1,Math.round(bmp.height*sc));
    const c = document.createElement('canvas'); c.width=w; c.height=h;
    c.getContext('2d').drawImage(bmp,0,0,w,h);
    try{ bmp.close(); }catch(e){}
    return await new Promise(r=>c.toBlob(b=>r(b),'image/jpeg',0.72));
  }catch(e){ return null; }
}
function setThumb(rec, tb){
  if(!tb) return;
  rec.thumb = tb; idbPut(rec);
  if(thumbURL[rec.id]){ try{URL.revokeObjectURL(thumbURL[rec.id]);}catch(e){} delete thumbURL[rec.id]; }
  const im = document.querySelector('#thumbs img[data-pid="'+rec.id+'"]');
  if(im){ thumbURL[rec.id]=URL.createObjectURL(tb); im.src = thumbURL[rec.id]; }
}
let thumbQueue = [], thumbBusy = false;
function queueThumb(rec){ thumbQueue.push(rec); pumpThumbs(); }
async function pumpThumbs(){
  if(thumbBusy) return; thumbBusy = true;
  while(thumbQueue.length){
    const r = thumbQueue.shift();
    try{ if(!r.thumb && photos.indexOf(r)>=0){ const tb = await makeThumb(r.blob); if(photos.indexOf(r)>=0) setThumb(r, tb); } }catch(e){}
    await new Promise(x=>setTimeout(x,80));
  }
  thumbBusy = false;
}

let delMode = false, lpFired = false;
function selTap(id){
  const list = folderPhotos(curFolder);
  const idx = list.findIndex(x=>x.id===id); if(idx<0) return;
  if(selIds.size===0){ selAnchorId=id; selIds.add(id); }
  else if(selIds.size===1){
    if(selAnchorId===id){ selIds.clear(); selAnchorId=null; }
    else{
      const aIdx=list.findIndex(x=>x.id===selAnchorId);
      if(aIdx<0){ selIds.clear(); selAnchorId=id; selIds.add(id); }
      else{ const a=Math.min(aIdx,idx), b=Math.max(aIdx,idx); selIds.clear(); for(let k=a;k<=b;k++) selIds.add(list[k].id); }

function attachLongPress(d, id){

    t=setTimeout(()=>{ t=null; lpFired=true; enterDelMode(id); }, 500); };
  const cancel=()=>{ if(t){ clearTimeout(t); t=null; } };
  d.addEventListener('touchstart', e=>{ if(e.touches.length!==1){ cancel(); return; } const c=e.touches[0]; begin(c.clientX,c.clientY); }, {passive:true});
  d.addEventListener('touchmove', e=>{ if(!t) return; const c=e.touches[0]; if(Math.abs(c.clientX-sx)>12||Math.abs(c.clientY-sy)>12) cancel(); }, {passive:true});
  d.addEventListener('touchend', cancel, {passive:true});
  d.addEventListener('touchcancel', cancel, {passive:true});
  d.addEventListener('mousedown', e=>begin(e.clientX,e.clientY));

/* ── 실시간 폰 폴더 저장 (APK 브리지) ── */
const FS_ROOT = '급식실점검사진';
function fsOn(){ return !!(window.HwangiBridge && HwangiBridge.fopen); }
function fsSan(s){ return String(s||'').replace(/[\\/:*?"<>|]/g,'_').replace(/\s+/g,' ').trim() || '무제'; }
function fsProjectName(){ return fsSession || fsSan(schoolFolderName()); }
function fsDirOf(fid){ if(fid==='doc') return '점검기록지'; if(fid==='base') return '기본 사진'; const f = FOLDERS.find(x=>x.id===fid); return fsSan(f? (f.short+' 사진') : String(fid)); }
let fsChain = Promise.resolve();
function fsEnqueue(fn){ fsChain = fsChain.then(fn).catch(()=>{}); return fsChain; }
let fsAckMap = {}, fsAckSeq = 0;
window.__fsAck = function(tk){ const r = fsAckMap[tk]; if(r){ delete fsAckMap[tk]; try{ r(); }catch(e){} } };
function fsAckWait(tk){ return new Promise(res=>{ fsAckMap[tk] = res; setTimeout(()=>{ if(fsAckMap[tk]){ delete fsAckMap[tk]; res(); } }, 6000); }); }
async function fsWriteBlob(relPath, name, blob){
  if(!fsOn()) return;
  try{
    HwangiBridge.fdelete(relPath, name);
    HwangiBridge.fopen(relPath, name);
    const CH = 2*1024*1024;
    for(let p=0; p<blob.size; p+=CH){
      const buf = new Uint8Array(await blob.slice(p, Math.min(p+CH, blob.size)).arrayBuffer());
      let bin=''; const SUB=32768;
      for(let q=0; q<buf.length; q+=SUB) bin += String.fromCharCode.apply(null, buf.subarray(q, Math.min(q+SUB, buf.length)));
      HwangiBridge.fwrite(btoa(bin));
    }
    const tk = 'k'+(++fsAckSeq);
    const ackP = fsAckWait(tk);
    HwangiBridge.fclose(tk);
    await ackP;
  }catch(e){}
}
function fsSave(rec){
  if(!fsOn() || !rec || !rec.blob) return;
  if(!fsPermOk()){ if(!window.__fsPermWarned){ window.__fsPermWarned = true; fsPermAsk(); } return; }
  if(!fsSession){ fsSession = fsSan(schoolFolderName()); fsSessPersist(); fsSessUpdate(); }
  try{
    const d = new Date(rec.ts||Date.now());
    const name = 'T'+pad(d.getHours(),2)+pad(d.getMinutes(),2)+pad(d.getSeconds(),2)+'_'+(rec.seq||0)+extOf(rec.blob);
    rec.fsp = fsProjectName()+'/'+fsDirOf(rec.fid); rec.fsn = name;
    idbPut(rec);
    fsEnqueue(()=>fsWriteBlob(rec.fsp, name, rec.blob));
  }catch(e){}
}
function fsRemove(rec){
  if(!fsOn() || !rec || !rec.fsp || !rec.fsn) return;
  const rp=rec.fsp, rn=rec.fsn;
  fsEnqueue(()=>{ try{ HwangiBridge.fdelete(rp, rn); }catch(e){} });
}
function fsResave(rec){ if(!fsOn()) return; fsRemove(rec); rec.fsp=null; rec.fsn=null; fsSave(rec); }

window.__fsDone = function(ok, fail){
  fsBusy = false;
  const pr=$('prog'); if(pr) pr.style.display='none';
  toast(fail? ('📂 저장 '+ok+'건 · 실패 '+fail+'건') : ('📂 폰 폴더 저장 완료 ('+ok+'건)'));

async function exportFolder(skipConfirm){
  if(typeof pendingShots !== 'undefined' && Object.keys(pendingShots).length){ toast('사진 저장 마무리 중… 2초 후 다시 눌러주세요'); return; }
  if(!fsOn()){ alert('이 기능은 APK 앱에서만 사용할 수 있습니다.'); return; }
  if(!fsPermOk()){ fsPermAsk(); return; }
  if(fsBusy){ toast('이미 저장 중입니다'); return; }
  finalizePendingUndo();
  if(!photos.length){ alert('저장된 사진이 없습니다.'); return; }
  if(!$('schName').value.trim()){ alert('학교명을 입력해 주세요.'); $('schName').focus(); return; }
  const proj = fsProjectName();
  const jobs = [];
  const docName = ($('schName').value.trim()||'학교명미입력').replace(/[\\/:*?"<>|]/g,'').trim() || '학교명미입력';
  const used = new Set();
  const uq = (rel,n)=>{ let key=rel+'|'+n; if(!used.has(key)){ used.add(key); return n; } let i=1,p,k2; const dot=n.lastIndexOf('.'); do{ p=n.slice(0,dot)+'_'+(i++)+n.slice(dot); k2=rel+'|'+p; }while(used.has(k2)); used.add(k2); return p; };
  folderPhotos('doc').forEach(p=>jobs.push({rel: proj, name: uq(proj, docName+extOf(p.blob)), blob: p.blob}));
  folderPhotos('base').forEach(p=>jobs.push({rel: proj+'/기본 사진', name: uq(proj+'/기본 사진', tsName(p.ts)+extOf(p.blob)), blob: p.blob}));
  for(let i=1;i<=15;i++){ folderPhotos('h'+i).forEach((p,idx)=>jobs.push({rel: proj+'/후드'+i+' 사진', name: pad(idx+1,2)+extOf(p.blob), blob: p.blob})); }
  if(!jobs.length){ toast('내보낼 사진이 없습니다'); return; }
  const __run = async ()=>{
    fsBusy = true;
    $('prog').style.display='flex'; $('progMsg').textContent='📂 폰 폴더로 저장 중… 0/'+jobs.length+'건';
    $('pfill').style.width='0%';
    if(HwangiBridge.fbegin) HwangiBridge.fbegin();
    let done = 0;
    for(const j of jobs){
      await fsEnqueue(()=>fsWriteBlob(j.rel, j.name, j.blob));
      done++; $('pfill').style.width = Math.round(100*done/jobs.length)+'%'; $('progMsg').textContent='📂 폰 폴더로 저장 중… '+done+'/'+jobs.length+'건';
    }
    photos.forEach(p=>{ if(p.fsn && p.fsn.charAt(0)==='T'){ fsRemove(p); p.fsp=null; p.fsn=null; } });
    idbPutMany(photos);
    if(HwangiBridge.fnotify) HwangiBridge.fnotify(''); else window.__fsDone(done, 0);
  };
  if(skipConfirm === true){ __run(); return; }
  confirmBox('사진 '+photos.length+'장을 최종 번호(01, 02…)로\n폰 폴더에 저장할까요?', __run);
}

function reorderSel(where){
  if(!selIds.size){ toast('먼저 옮길 사진들을 누르세요'); return; }
  const list = folderPhotos(curFolder);
  const selected = list.filter(p=>selIds.has(p.id));
  const others   = list.filter(p=>!selIds.has(p.id));
  if(!others.length){ toast('이 폴더의 사진이 모두 선택됐어요'); return; }
  const firstSel = list.findIndex(p=>selIds.has(p.id));
  let anchor = 0;
  for(let k=0;k<firstSel;k++) if(!selIds.has(list[k].id)) anchor++;
  let at;
  if(where==='first')      at = 0;
  else if(where==='last')  at = others.length;
  else if(where==='up')    at = Math.max(0, anchor-1);
  else                     at = Math.min(others.length, anchor+1);
  if((where==='up'||where==='down') && at===anchor){ toast('이미 끝입니다'); return; }
  const newList = [...others.slice(0,at), ...selected, ...others.slice(at)];
  const pool = list.map(p=>p.seq).slice().sort((a,b)=>a-b);
  newList.forEach((p,k)=>{ p.seq = pool[k]; }); idbPutMany(newList);
  renderFolder();
}

/* ───────── 문서 모서리 보정(수동 4점 → 반듯하게) ───────── */
function homography(from, to){
  const A=[], b=[];
  for(let k=0;k<4;k++){ const x=from[k][0],y=from[k][1],u=to[k][0],v=to[k][1];
    A.push([x,y,1,0,0,0,-x*u,-y*u]); b.push(u);
    A.push([0,0,0,x,y,1,-x*v,-y*v]); b.push(v);
  }
  for(let i=0;i<8;i++){
    let piv=i; for(let r=i+1;r<8;r++) if(Math.abs(A[r][i])>Math.abs(A[piv][i])) piv=r;
    if(Math.abs(A[piv][i])<1e-9) return null;
    [A[i],A[piv]]=[A[piv],A[i]]; [b[i],b[piv]]=[b[piv],b[i]];
    for(let r=0;r<8;r++){ if(r===i) continue; const f=A[r][i]/A[i][i];
      for(let c=i;c<8;c++) A[r][c]-=f*A[i][c]; b[r]-=f*b[i]; }
  }
  const h=[]; for(let i=0;i<8;i++) h.push(b[i]/A[i][i]); return h;
}
function warpDoc(img, src){
  const dist=(a,b)=>Math.hypot(a[0]-b[0],a[1]-b[1]);
  let W=Math.round((dist(src[0],src[1])+dist(src[3],src[2]))/2);
  let Ht=Math.round((dist(src[0],src[3])+dist(src[1],src[2]))/2);
  W=Math.max(8,W); Ht=Math.max(8,Ht);
  const cap=2000, mx=Math.max(W,Ht); if(mx>cap){ const s=cap/mx; W=Math.round(W*s); Ht=Math.round(Ht*s); }
  const dst=[[0,0],[W,0],[W,Ht],[0,Ht]];
  const hg=homography(dst, src); if(!hg) return null;
  const sc=document.createElement('canvas'); sc.width=img.naturalWidth; sc.height=img.naturalHeight;
  const sx2=sc.getContext('2d',{willReadFrequently:true}); sx2.drawImage(img,0,0);
  const SD=sx2.getImageData(0,0,sc.width,sc.height).data, SW=sc.width, SH=sc.height;
  const oc=document.createElement('canvas'); oc.width=W; oc.height=Ht;
  const octx=oc.getContext('2d'); const od=octx.createImageData(W,Ht); const OD=od.data;
  for(let y=0;y<Ht;y++){ for(let x=0;x<W;x++){
    const dn=hg[6]*x+hg[7]*y+1;
    const u=(hg[0]*x+hg[1]*y+hg[2])/dn, v=(hg[3]*x+hg[4]*y+hg[5])/dn;
    const oi=(y*W+x)*4;
    if(u<0||v<0||u>=SW-1||v>=SH-1){ OD[oi]=255;OD[oi+1]=255;OD[oi+2]=255;OD[oi+3]=255; continue; }
    const x0=u|0,y0=v|0,fx=u-x0,fy=v-y0; const i00=(y0*SW+x0)*4, i10=i00+4, i01=i00+SW*4, i11=i01+4;
    for(let c=0;c<3;c++){ const a=SD[i00+c]*(1-fx)+SD[i10+c]*fx, bb=SD[i01+c]*(1-fx)+SD[i11+c]*fx; OD[oi+c]=a*(1-fy)+bb*fy; }
    OD[oi+3]=255;
  }}
  octx.putImageData(od,0,0);
  return new Promise(r=>oc.toBlob(b=>r(b),'image/jpeg',0.92));
}

function buildDocCrop(id, img){
    const iw=img.naturalWidth, ih=img.naturalHeight;

    ov.innerHTML='<div style="display:flex;gap:8px;padding:10px;background:#0b0f14;">'

    let H=[[geo.ox,geo.oy],[geo.ox+geo.dw,geo.oy],[geo.ox+geo.dw,geo.oy+geo.dh],[geo.ox,geo.oy+geo.dh]];
    const clX=v=>Math.max(geo.ox,Math.min(geo.ox+geo.dw,v)), clY=v=>Math.max(geo.oy,Math.min(geo.oy+geo.dh,v));

function rotateFrame(src, w, h, ang){
  const c = document.createElement('canvas');
  c.width = h; c.height = w;
  const x = c.getContext('2d');
  if(ang === 90){ x.translate(0, w); x.rotate(-Math.PI/2); }

  x.drawImage(src, 0, 0);
  return c;
}

let encWorker = null, encOK = false;
const pendingShots = {};   // id -> {fid, ts, seq}
function pendCount(fid){ let n=0; for(const k in pendingShots) if(pendingShots[k].fid===fid) n++; return n; }
function initWorker(){
  if(encWorker !== null) return;
  try{
    if(typeof OffscreenCanvas === 'undefined' || !OffscreenCanvas.prototype.convertToBlob){ encWorker = false; return; }
    const src = `
    function analyzeSharp(ctx, W, H){
      var cw = Math.min(1400, W), ch = Math.min(1400, H);
      var x0 = (W-cw)>>1, y0 = (H-ch)>>1;
      var dat = ctx.getImageData(x0, y0, cw, ch).data;
      var n = cw*ch, g = new Float32Array(n), sum = 0, i, j;
      for(i=0,j=0;i<n;i++,j+=4){ var y = 0.299*dat[j]+0.587*dat[j+1]+0.114*dat[j+2]; g[i]=y; sum+=y; }
      var luma = sum/n, s=0, s2=0, cnt=0, xx, yy;
      for(yy=1; yy<ch-1; yy++){ for(xx=1; xx<cw-1; xx++){ var k=yy*cw+xx; var lap=4*g[k]-g[k-1]-g[k+1]-g[k-cw]-g[k+cw]; s+=lap; s2+=lap*lap; cnt++; } }
      var mean=s/cnt; return { sharp: s2/cnt - mean*mean, luma: luma };
    }
    self.onmessage = async e => {
      const d = e.data;
      try{
        let rw = d.W, rh = d.H, srcC = d.bmp;
        if(d.rot === 90 || d.rot === 270){
          rw = d.H; rh = d.W;
          const t = new OffscreenCanvas(rw, rh);
          const tx = t.getContext('2d');
          if(d.rot === 90){ tx.translate(0, rh); tx.rotate(-Math.PI/2); }
          else            { tx.translate(rw, 0); tx.rotate( Math.PI/2); }
          tx.drawImage(d.bmp, 0, 0);
          srcC = t;
        }
        const land = rw >= rh; let tw, th;
        if(land){ if(rw/rh >= d.ratio){ th=rh; tw=Math.round(rh*d.ratio); } else { tw=rw; th=Math.round(rw/d.ratio); } }
        else    { if(rh/rw >= d.ratio){ tw=rw; th=Math.round(rw*d.ratio); } else { th=rh; tw=Math.round(rh/d.ratio); } }
        let sx=(rw-tw)>>1, sy=(rh-th)>>1, cw=tw, ch=th;
        if(d.dz > 1){
          const nw = Math.round(tw/d.dz), nh = Math.round(th/d.dz);
          sx += (tw-nw)>>1; sy += (th-nh)>>1; cw = nw; ch = nh;
        }
        let ow = cw, oh = ch;
        if(d.fw){ ow = land ? d.fw : d.fh; oh = land ? d.fh : d.fw; }
        const out = new OffscreenCanvas(ow, oh);
        const octx = out.getContext('2d');
        octx.drawImage(srcC, sx, sy, cw, ch, 0, 0, ow, oh);
        if(d.bmp.close) d.bmp.close();
        const blob = await out.convertToBlob({type:'image/jpeg', quality:0.88});
        self.postMessage({id:d.id, blob:blob});
      }catch(err){ self.postMessage({id:d.id, blob:null}); }
    };`;
    encWorker = new Worker(URL.createObjectURL(new Blob([src], {type:'text/javascript'})));
    encWorker.onmessage = ev => finishShot(ev.data.id, ev.data.blob);
    encOK = true;
  }catch(e){ encWorker = false; encOK = false; }
}
function finishShot(id, blob){
  const meta = pendingShots[id]; delete pendingShots[id];
  if(!meta){ return; }
  if(!blob){ toast('1장 저장 실패'); updateCamHead(); return; }
  const rec = {id: Date.now()+'_'+Math.random().toString(36).slice(2,8), fid:meta.fid, ts:meta.ts, seq:meta.seq, blob};
  photos.push(rec); idbPut(rec);
  queueThumb(rec); fsSave(rec);
  if($('camView').style.display==='flex' && curFolder===meta.fid) $('lastTh').src = URL.createObjectURL(blob);
  updateCamHead();
  if($('folderView').style.display!=='none' && $('camView').style.display!=='flex' && curFolder===meta.fid) renderFolder();

}

function snap(){
  if(!stream || $('camView').style.display!=='flex') return;
  if(reviewing) return;
  if(arming) return;
  if(!stabOn){ doSnap(); return; }
  arming = true; setStab(true);
  const t0 = Date.now(); let steadySince = 0;
  const tick = ()=>{
    if(!stream || $('camView').style.display!=='flex'){ arming=false; setStab(false); return; }
    const now = Date.now();
    if(motionLevel < STAB_THRESH){ if(!steadySince) steadySince = now; } else steadySince = 0;
    const steady = steadySince && (now - steadySince >= STAB_HOLD) && (now - t0 >= STAB_MIN);
    if(steady || now - t0 >= STAB_MAX){ arming=false; setStab(false); doSnap(); }
    else setTimeout(tick, 25);
  };
  setTimeout(tick, 25);
}

let audioCtx=null;
function shutterBurst(ctx, at, dur, hp, lp, vol){
  const n = Math.max(1, Math.floor(ctx.sampleRate * dur));
  const buf = ctx.createBuffer(1, n, ctx.sampleRate);
  const d = buf.getChannelData(0);
  for(let i=0;i<n;i++){ const e = Math.pow(1 - i/n, 2.2); d[i] = (Math.random()*2-1) * e; }
  const src = ctx.createBufferSource(); src.buffer = buf;
  const hpf = ctx.createBiquadFilter(); hpf.type='highpass'; hpf.frequency.value=hp;
  const lpf = ctx.createBiquadFilter(); lpf.type='lowpass';  lpf.frequency.value=lp;
  const g = ctx.createGain(); g.gain.value = vol;
  src.connect(hpf); hpf.connect(lpf); lpf.connect(g); g.connect(ctx.destination);
  src.start(ctx.currentTime + at);
}
function shutterSound(){
  try{
    audioCtx = audioCtx || new (window.AudioContext||window.webkitAudioContext)();
    if(audioCtx.state==='suspended') audioCtx.resume();
    shutterBurst(audioCtx, 0,     0.028, 2200, 9500, 1.0);  // '찰' (날카로운 클릭)
    shutterBurst(audioCtx, 0.052, 0.050, 700,  4500, 1.0);  // '칵' (낮고 둔탁한 클릭)
  }catch(e){}
}

let silentAudio=null;
function makeSilentWav(){
  const sr=8000, n=sr;
  const buf=new ArrayBuffer(44+n*2); const v=new DataView(buf);
  const ws=(o,s)=>{ for(let i=0;i<s.length;i++) v.setUint8(o+i, s.charCodeAt(i)); };
  ws(0,'RIFF'); v.setUint32(4,36+n*2,true); ws(8,'WAVE'); ws(12,'fmt ');
  v.setUint32(16,16,true); v.setUint16(20,1,true); v.setUint16(22,1,true);
  v.setUint32(24,sr,true); v.setUint32(28,sr*2,true); v.setUint16(32,2,true); v.setUint16(34,16,true);
  ws(36,'data'); v.setUint32(40,n*2,true);
  return new Blob([buf],{type:'audio/wav'});
}
function startMediaSession(){
  try{
    if(!silentAudio){
      silentAudio = new Audio(URL.createObjectURL(makeSilentWav()));
      silentAudio.loop = true; silentAudio.volume = 0.05;
    }
    silentAudio.play().catch(()=>{});
    if('mediaSession' in navigator){
      try{ navigator.mediaSession.metadata = new MediaMetadata({title:'환기사진 촬영 중'}); }catch(e){}
      try{ navigator.mediaSession.playbackState = 'playing'; }catch(e){}
      ['play','pause','stop','nexttrack','previoustrack','seekforward','seekbackward'].forEach(a=>{
        try{ navigator.mediaSession.setActionHandler(a, ()=>{ snap(); try{ silentAudio.play().catch(()=>{}); }catch(e){} }); }catch(e){}
      });
    }
  }catch(e){}
}
function stopMediaSession(){
  try{ if(silentAudio) silentAudio.pause(); }catch(e){}
}

function addPhoto(fid, blob, ts){
  const rec = {id: Date.now()+'_'+Math.random().toString(36).slice(2,8), fid, ts, seq: seqCounter++, blob};
  photos.push(rec);
  idbPut(rec);
  queueThumb(rec); fsSave(rec);
}
function removePhoto(id){
  const idx = photos.findIndex(p=>p.id===id); if(idx<0) return;
  const rec = photos[idx];
  photos.splice(idx,1);
  if(thumbURL[id]){ try{URL.revokeObjectURL(thumbURL[id]);}catch(e){} delete thumbURL[id]; }
  idbDel(id); fsRemove(rec);
  if($('folderView').style.display!=='none') removeThumbCell(id);
}
function resetAll(){
  const total = photos.length;
  if(!total){ toast('사진이 없습니다'); return; }
  if(!confirm('사진 '+total+'장을 모두 삭제하고 새 학교를 시작할까요?')) return;
  if(!confirm('정말 삭제합니다. 노트북(LocalSend) 전송은 하셨나요?')) return;
  photos.forEach(p=>{ if(thumbURL[p.id]){URL.revokeObjectURL(thumbURL[p.id]); delete thumbURL[p.id];} });
  photos = []; idbClear(); renderHome(); toast('전체 삭제 완료');
}

/* ───────── 파일명 ───────── */
function pad(n,len){ return String(n).padStart(len,'0'); }
function tsName(ts){
  const d = new Date(ts);
  return ''+d.getFullYear()+pad(d.getMonth()+1,2)+pad(d.getDate(),2)+'_'+pad(d.getHours(),2)+pad(d.getMinutes(),2)+pad(d.getSeconds(),2);
}
function extOf(blob){
  const t = (blob.type||'').toLowerCase();
  if(t.includes('png')) return '.png';
  return '.jpg';
}

function lsSendTo(name, d, pin){

  try{ HwangiBridge.lsSend(name, d.ip, d.proto||'https', pin||''); }

window.__lsProg = function(done, total){
  $('progMsg').textContent='📡 노트북 전송 중… '+done+'/'+total;
  $('pfill').style.width=Math.round(100*done/Math.max(1,total))+'%';
};
window.__lsDone = function(ok, fail, msg){
  lsBusy = false; $('prog').style.display='none';
  if(msg === 'PIN'){
    const p = prompt('노트북 LocalSend에 PIN이 설정되어 있습니다.\nPIN 입력:');
    if(p && lsDev) lsSendTo(lsPendFolder, lsDev, p.trim());
    return;
  }
  if(msg === 'NOFILES'){
    choiceBox('보낼 폴더를 찾지 못했습니다\n📁 '+lsPendFolder, [
      {label:'폴더 목록에서 고르기', bg:'#2563eb', fn:function(){ lsPickFolder(); }},
      {label:'취소', bg:'#374151', fn:null}
    ]); return;
  }
  if(msg === 'CONNECT'){
    toast('저장된 노트북에 연결되지 않아 다시 찾습니다');
    lsDev = null; lsScanGo(); return;
  }
  if(msg === 'REJECT'){ toast('노트북에서 거절(또는 시간초과)했습니다'); return; }
  if(msg === 'BUSY'){ toast('노트북이 다른 전송을 받는 중입니다'); return; }
  if(msg){ toast('⚠ 전송 실패 ('+msg+')'); return; }
  if(fail>0){ toast('⚠ '+ok+'개 성공 · '+fail+'개 실패 — 한 번 더 보내주세요'); return; }
  toast('✅ 노트북 전송 완료 ('+ok+'개) · 노트북 다운로드 폴더를 확인하세요');

/* ───────── ZIP (STORE, UTF-8 파일명) ───────── */
const CRC_TABLE = (()=>{ const t=new Uint32Array(256);
  for(let i=0;i<256;i++){ let c=i; for(let k=0;k<8;k++) c = (c&1)?(0xEDB88320^(c>>>1)):(c>>>1); t[i]=c>>>0; }
  return t; })();
function crcUpdate(buf, crc){
  for(let i=0;i<buf.length;i++) crc = CRC_TABLE[(crc^buf[i])&0xFF] ^ (crc>>>8);
  return crc;
}
function dosDT(d){
  const time = ((d.getHours()<<11)|(d.getMinutes()<<5)|(d.getSeconds()>>1)) & 0xFFFF;
  const date = (((Math.max(d.getFullYear(),1980)-1980)<<9)|((d.getMonth()+1)<<5)|d.getDate()) & 0xFFFF;
  return {time,date};
}
async function buildZip(entries, onProg){
  const enc = new TextEncoder();
  const parts = [], central = [];
  let offset = 0;
  for(let fi=0; fi<entries.length; fi++){
    const en = entries[fi];
    const nameB = enc.encode(en.path);
    const data = new Uint8Array(await en.blob.arrayBuffer());
    let crc = 0xFFFFFFFF;
    const CHUNK = 1<<20;
    for(let p=0; p<data.length; p+=CHUNK){
      crc = crcUpdate(data.subarray(p, Math.min(p+CHUNK, data.length)), crc);
    }
    crc = (crc ^ 0xFFFFFFFF) >>> 0;
    const size = en.blob.size;
    const {time,date} = dosDT(new Date(en.ts||Date.now()));
    const lh = new DataView(new ArrayBuffer(30));
    lh.setUint32(0,0x04034b50,true); lh.setUint16(4,20,true); lh.setUint16(6,0x0800,true);
    lh.setUint16(8,0,true); lh.setUint16(10,time,true); lh.setUint16(12,date,true);
    lh.setUint32(14,crc,true); lh.setUint32(18,size,true); lh.setUint32(22,size,true);
    lh.setUint16(26,nameB.length,true); lh.setUint16(28,0,true);
    parts.push(new Uint8Array(lh.buffer), nameB, en.blob);
    const ch = new DataView(new ArrayBuffer(46));
    ch.setUint32(0,0x02014b50,true); ch.setUint16(4,20,true); ch.setUint16(6,20,true);
    ch.setUint16(8,0x0800,true); ch.setUint16(10,0,true); ch.setUint16(12,time,true); ch.setUint16(14,date,true);
    ch.setUint32(16,crc,true); ch.setUint32(20,size,true); ch.setUint32(24,size,true);
    ch.setUint16(28,nameB.length,true); ch.setUint32(42,offset,true);
    central.push(new Uint8Array(ch.buffer), nameB);
    offset += 30 + nameB.length + size;
    if(onProg) onProg((fi+1)/entries.length);
    await new Promise(r=>setTimeout(r));
  }
  let cdSize = 0; central.forEach(u=>cdSize+=u.length);
  const eo = new DataView(new ArrayBuffer(22));
  eo.setUint32(0,0x06054b50,true);
  eo.setUint16(8,entries.length,true); eo.setUint16(10,entries.length,true);
  eo.setUint32(12,cdSize,true); eo.setUint32(16,offset,true);
  return new Blob([...parts, ...central, new Uint8Array(eo.buffer)], {type:'application/zip'});
}

/* ───────── 내보내기 ───────── */
function buildEntries(){
  const root = fsSession || schoolFolderName();
  const entries = [];
  const used = new Set();
  function uniq(path){
    if(!used.has(path)){ used.add(path); return path; }
    let i=1, p;
    const dot = path.lastIndexOf('.');
    do{ p = path.slice(0,dot)+'_'+(i++)+path.slice(dot); }while(used.has(p));
    used.add(p); return p;
  }
  const docName = ($('schName').value.trim()||'학교명미입력').replace(/[\\/:*?"<>|]/g,'').trim() || '학교명미입력';
  folderPhotos('doc').forEach(p=>entries.push({path: uniq(root+'/'+docName+extOf(p.blob)), blob:p.blob, ts:p.ts}));
  folderPhotos('base').forEach(p=>entries.push({path: uniq(root+'/기본 사진/'+tsName(p.ts)+extOf(p.blob)), blob:p.blob, ts:p.ts}));
  for(let i=1;i<=15;i++){
    folderPhotos('h'+i).forEach((p,idx)=>entries.push({path: uniq(root+'/후드'+i+' 사진/'+pad(idx+1,2)+extOf(p.blob)), blob:p.blob, ts:p.ts}));
  }
  return entries;
}
async function exportZip(share){
  if(typeof pendingShots !== 'undefined' && Object.keys(pendingShots).length){ toast('사진 저장 마무리 중… 2초 후 다시 눌러주세요'); return; }
  if(!photos.length){ alert('저장된 사진이 없습니다.'); return; }
  if(!$('schName').value.trim()){ alert('학교명을 입력해 주세요.'); $('schName').focus(); return; }
  const entries = buildEntries();
  $('prog').style.display='flex'; $('progMsg').textContent='ZIP 만드는 중… ('+entries.length+'장)';
  try{
    const zip = await buildZip(entries, r=>{ $('pfill').style.width = Math.round(r*100)+'%'; });
    const fname = (fsSession || schoolFolderName())+'.zip';
    if(window.HwangiBridge){   // APK 안에서는 네이티브 브리지로 다운로드 폴더에 저장
      $('progMsg').textContent='파일 저장 중…';
      const CH = 3*1024*1024;
      HwangiBridge.start(fname);
      for(let p=0; p<zip.size; p+=CH){
        const buf = new Uint8Array(await zip.slice(p, Math.min(p+CH, zip.size)).arrayBuffer());
        let bin=''; const SUB=32768;
        for(let q=0; q<buf.length; q+=SUB) bin += String.fromCharCode.apply(null, buf.subarray(q, Math.min(q+SUB, buf.length)));
        HwangiBridge.append(btoa(bin));
        $('pfill').style.width = Math.round(100*Math.min(p+CH,zip.size)/zip.size)+'%';
        await new Promise(r=>setTimeout(r));
      }
      HwangiBridge.finish();
      $('prog').style.display='none';
      if(share && HwangiBridge.share){ try{ HwangiBridge.share(); }catch(e){} toast('공유할 앱을 선택하세요'); }
      else toast('다운로드 폴더에 저장: '+fname);
      return;
    }
    if(share && navigator.canShare){
      const file = new File([zip], fname, {type:'application/zip'});
      if(navigator.canShare({files:[file]})){
        $('prog').style.display='none';
        await navigator.share({files:[file], title:fname}).catch(()=>{});
        return;
      }
    }
    const a = document.createElement('a');
    a.href = URL.createObjectURL(zip); a.download = fname;
    document.body.appendChild(a); a.click();
    setTimeout(()=>{ URL.revokeObjectURL(a.href); a.remove(); }, 4000);
    $('prog').style.display='none';
    toast('다운로드 폴더에 저장: '+fname);
  }catch(err){
    $('prog').style.display='none';
    alert('내보내기 실패: '+err);
  }
}
