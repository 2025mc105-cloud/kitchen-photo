<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="theme-color" content="#0f1419">
<title>급식실 환기 사진</title>
<link rel="manifest" href="./manifest.json">
<link rel="icon" href="./icon-192.png">
<link rel="apple-touch-icon" href="./icon-192.png">
<style>
  :root{
    --bg:#0f1419; --card:#1a2230; --card2:#223046; --line:#2e3d55;
    --txt:#eaf0f8; --sub:#8fa3bf; --acc:#3b82f6; --ok:#22c55e; --warn:#f59e0b; --del:#ef4444;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  body{margin:0; background:var(--bg); color:var(--txt); font-family:'Malgun Gothic',system-ui,sans-serif;}
  .view{max-width:560px; margin:0 auto; padding:12px 12px 90px;}
  h1{font-size:20px; margin:6px 0 2px;}
  .sub{color:var(--sub); font-size:13px; margin-bottom:10px;}
  .banner{background:#7c2d12; color:#fde68a; padding:8px 10px; border-radius:8px; font-size:13px; margin-bottom:10px; display:none;}
  .installbar{display:none; background:#173054; border:1px solid var(--acc); color:#cfe3ff; padding:10px; border-radius:10px; font-size:14px; margin-bottom:10px;}
  .installbar button{float:right; background:var(--acc); border:none; color:#fff; padding:8px 14px; border-radius:8px; font-size:14px; font-weight:bold; margin-top:-4px;}
  .card{background:var(--card); border:1px solid var(--line); border-radius:12px; padding:12px; margin-bottom:12px;}
  .row{display:flex; gap:8px; margin-bottom:8px;}
  .row:last-child{margin-bottom:0;}
  label{font-size:12px; color:var(--sub); display:block; margin-bottom:3px;}
  input[type=text],input[type=number]{
    width:100%; padding:10px; font-size:16px; border-radius:8px;
    border:1px solid var(--line); background:var(--card2); color:var(--txt);
  }
  .foldername{font-size:14px; color:var(--ok); margin-top:8px; word-break:break-all;}
  .grid{display:grid; grid-template-columns:repeat(3,1fr); gap:8px;}
  .fbtn{
    position:relative; background:var(--card); border:1px solid var(--line); color:var(--txt);
    border-radius:12px; padding:16px 6px; font-size:15px; text-align:center; cursor:pointer;
  }
  .fbtn.wide{grid-column:1/-1; padding:14px; font-size:16px;}
  .fbtn.has{border-color:var(--ok); background:#14301f;}
  .badge{
    position:absolute; top:6px; right:6px; min-width:22px; height:22px; line-height:22px;
    background:var(--acc); border-radius:11px; font-size:12px; padding:0 5px; display:none;
  }
  .fbtn.has .badge{display:block; background:var(--ok); color:#06250f; font-weight:bold;}
  .bottom{
    position:fixed; left:0; right:0; bottom:0; background:#0b0f14ee; border-top:1px solid var(--line);
    display:flex; gap:8px; padding:10px 12px; max-width:584px; margin:0 auto;
  }
  .btn{flex:1; padding:14px 8px; font-size:16px; border:none; border-radius:10px; cursor:pointer; color:#fff; font-weight:bold;}
  .btn.blue{background:var(--acc);} .btn.green{background:var(--ok); color:#06250f;}
  .btn.gray{background:#374151;} .btn.red{background:var(--del);} .btn.warn{background:var(--warn); color:#3b2300;}
  /* 폴더 화면 */
  .fhead{display:flex; align-items:center; gap:10px; margin:4px 0 10px;}
  .back{background:var(--card2); border:1px solid var(--line); color:var(--txt); border-radius:10px; padding:10px 14px; font-size:16px;}
  .ftitle{font-size:18px; font-weight:bold;}
  .fcount{color:var(--ok); font-size:14px;}
  .hint{font-size:13px; color:var(--warn); margin-bottom:10px; line-height:1.5;}
  .gal{width:100%; padding:12px; font-size:14px; border:1px solid var(--line); border-radius:10px; background:var(--card); color:var(--sub); margin-bottom:12px;}
  .thumbs{display:grid; grid-template-columns:repeat(3,1fr); gap:8px;}
  .th{position:relative; border-radius:10px; overflow:hidden; border:1px solid var(--line); aspect-ratio:3/4; background:#000;}
  .th img{width:100%; height:100%; object-fit:cover;}
  .th .no{position:absolute; left:4px; top:4px; background:#000a; padding:2px 7px; border-radius:6px; font-size:13px; font-weight:bold;}
  .th .del{position:absolute; right:4px; top:4px; background:var(--del); border:none; color:#fff; width:30px; height:30px; border-radius:8px; font-size:15px;}
  /* ───── 내장 카메라 (전체화면 프리뷰 + 반투명 컨트롤) ───── */
  .camview{position:fixed; inset:0; background:#000; display:none; flex-direction:column; z-index:80;}
  .camtop{
    display:flex; align-items:center; gap:6px; padding:8px;
    background:rgba(0,0,0,.28); position:absolute; top:0; left:0; right:0; z-index:82;
  }
  .camtop .cbtn{background:#00000055; border:1px solid #ffffff33; color:#fff; border-radius:10px; padding:9px 11px; font-size:15px;}
  .camtitle{flex:1; text-align:center; font-size:15px; font-weight:bold; color:#fff; text-shadow:0 1px 3px #000;}
  .camcnt{color:var(--ok); font-weight:bold;}
  #camVideo{position:absolute; inset:0; width:100%; height:100%; object-fit:cover; z-index:81;}
  .camzoom{
    position:absolute; top:54px; left:0; right:0; z-index:82;
    display:flex; gap:6px; justify-content:center; flex-wrap:wrap; padding:4px 8px;
  }
  .zbtn{background:#00000066; border:1px solid #ffffff44; color:#fff; border-radius:16px; padding:7px 12px; font-size:14px; text-shadow:0 1px 2px #000;}
  .zbtn.on{background:var(--acc); border-color:var(--acc); font-weight:bold;}
  .zbtn.dim{opacity:.4;}
  .zbtn.alt{background:#00000044;}
  .cambottom{
    position:absolute; left:0; right:0; bottom:0; z-index:82; background:rgba(0,0,0,.22);
    display:flex; align-items:center; justify-content:space-between; padding:12px 22px calc(12px + env(safe-area-inset-bottom));
  }
  .lastth{width:54px; height:54px; border-radius:10px; border:2px solid #fff7; object-fit:cover; background:#222;}
  .shutter{width:78px; height:78px; border-radius:50%; border:5px solid #fff; background:#ffffff44;}
  .shutter:active{background:#fff;}
  .camside{width:54px; display:flex; flex-direction:column; gap:8px; align-items:center;}
  .flashfx{position:fixed; inset:0; background:#fff; opacity:0; pointer-events:none; z-index:90; transition:opacity .12s;}
  /* 오버레이/진행/토스트 */
  .overlay{position:fixed; inset:0; background:#000d; display:none; flex-direction:column; align-items:center; justify-content:center; gap:14px; padding:24px; z-index:50;}
  .overlay .msg{font-size:20px; color:var(--ok); font-weight:bold;}
  .overlay .cnt{font-size:15px; color:var(--sub);}
  .overlay .btn{flex:none; width:100%; max-width:380px; padding:20px; font-size:20px;}
  .prog{position:fixed; inset:0; background:#000c; display:none; align-items:center; justify-content:center; z-index:60;}
  .pbox{background:var(--card); border:1px solid var(--line); border-radius:14px; padding:22px; width:84%; max-width:360px; text-align:center;}
  .pbar{height:12px; background:var(--card2); border-radius:6px; overflow:hidden; margin-top:12px;}
  .pfill{height:100%; width:0%; background:var(--ok);}
  .toast{
    position:fixed; bottom:96px; left:50%; transform:translateX(-50%); background:#111c; color:#fff;
    padding:10px 18px; border-radius:20px; font-size:14px; display:none; z-index:95; white-space:nowrap;
  }
</style>
</head>
<body>

<!-- ───────── 홈 화면 ───────── -->
<div class="view" id="homeView">
  <h1>📷 급식실 환기 사진</h1>
  <div class="sub">폴더를 누르고 촬영하면 자동 분류됩니다 · 총 <b id="totalCnt">0</b>장 · <span style="color:var(--acc)">v9</span></div>
  <div class="installbar" id="installBar">📲 이 앱을 폰에 설치할 수 있습니다 <button onclick="doInstall()">앱 설치</button></div>
  <div class="banner" id="storeBanner">⚠ 이 브라우저는 임시저장이 안 됩니다. 내보내기 전에 화면을 닫지 마세요.</div>

  <div class="card">
    <div class="row">
      <div style="flex:0 0 30%"><label>번호</label><input type="number" id="schNum" placeholder="27"></div>
      <div style="flex:1"><label>학교명</label><input type="text" id="schName" placeholder="오금초등학교"></div>
    </div>
    <div class="row">
      <div style="flex:1"><label>월</label><input type="number" id="schM"></div>
      <div style="flex:1"><label>일</label><input type="number" id="schD"></div>
      <div style="flex:1"><label>시</label><input type="number" id="schH"></div>
    </div>
    <div class="foldername" id="folderPreview"></div>
  </div>

  <div class="grid" id="folderGrid"></div>

  <div class="bottom">
    <button class="btn red" style="flex:0 0 28%" onclick="resetAll()">전체삭제</button>
    <button class="btn warn" style="flex:0 0 24%" onclick="exportZip(true)">공유</button>
    <button class="btn green" onclick="exportZip(false)">ZIP 내보내기</button>
  </div>
</div>

<!-- ───────── 폴더 화면 ───────── -->
<div class="view" id="folderView" style="display:none">
  <div class="fhead">
    <button class="back" onclick="goHome()">← 뒤로</button>
    <div>
      <div class="ftitle" id="fTitle"></div>
      <div class="fcount"><span id="fCnt">0</span>장</div>
    </div>
  </div>
  <div class="hint" id="fHint"></div>
  <button class="gal" onclick="openGallery()">🖼 갤러리에서 가져오기 (여러 장 선택 가능)</button>
  <div class="thumbs" id="thumbs"></div>
  <div class="bottom">
    <button class="btn gray" onclick="goHome()">폴더 선택으로</button>
    <button class="btn blue" onclick="openCamera()">📷 촬영 (연속)</button>
  </div>
</div>

<!-- ───────── 내장 카메라 (연속촬영) ───────── -->
<div class="camview" id="camView">
  <video id="camVideo" playsinline autoplay muted></video>
  <div class="camtop">
    <button class="cbtn" onclick="closeCam()">✕ 닫기</button>
    <button class="cbtn" onclick="camMove(-1)">◀</button>
    <div class="camtitle"><span id="camFolder"></span> · <span class="camcnt" id="camCnt">0</span>장</div>
    <button class="cbtn" onclick="camMove(1)">▶</button>
    <button class="cbtn" id="torchBtn" style="display:none" onclick="toggleTorch()">🔦</button>
  </div>
  <div class="camzoom" id="camZoom"></div>
  <div class="cambottom">
    <img class="lastth" id="lastTh" alt="">
    <button class="shutter" id="shutterBtn" onclick="snap()"></button>
    <div class="camside">
      <button class="cbtn" id="hqBtn" onclick="toggleHQ()" style="font-size:13px">고속</button>
    </div>
  </div>
</div>
<div class="flashfx" id="flashFx"></div>

<!-- 기본카메라(예비) 촬영 후 오버레이 -->
<div class="overlay" id="overlay">
  <div class="msg">✓ 저장됨</div>
  <div class="cnt" id="ovInfo"></div>
  <button class="btn blue" onclick="hideOverlay(); openCamera();">📷 다음 사진 촬영</button>
  <button class="btn gray" onclick="hideOverlay()">그만 (목록 보기)</button>
</div>

<!-- 진행률 -->
<div class="prog" id="prog">
  <div class="pbox">
    <div id="progMsg">ZIP 만드는 중…</div>
    <div class="pbar"><div class="pfill" id="pfill"></div></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<input type="file" id="camInput" accept="image/*" capture="environment" style="display:none">
<input type="file" id="galInput" accept="image/*" multiple style="display:none">

<script>
'use strict';
/* ───────── 폴더 정의 ───────── */
const FOLDERS = [{id:'doc', label:'📋 점검기록지 (수기 기록지)', short:'점검기록지', wide:true},
                 {id:'base', label:'🏫 기본 사진 (급식실 전경·스티커)', short:'기본 사진', wide:true}];
for (let i=1;i<=15;i++) FOLDERS.push({id:'h'+i, label:'후드'+i, short:'후드'+i});
const FLABEL={}, FSHORT={}, FIDS=[];
FOLDERS.forEach(f=>{FLABEL[f.id]=f.label; FSHORT[f.id]=f.short; FIDS.push(f.id);});

let photos = [];          // {id, fid, ts, seq, blob}
let seqCounter = 1;
let curFolder = null;
let db = null, idbOK = false;
const thumbURL = {};

/* ───────── IndexedDB ───────── */
function openDB(){
  return new Promise(res=>{
    try{
      const rq = indexedDB.open('gimsil_photo_app', 1);
      rq.onupgradeneeded = ()=>{ rq.result.createObjectStore('photos', {keyPath:'id'}); };
      rq.onsuccess = ()=>{ db=rq.result; idbOK=true; res(true); };
      rq.onerror   = ()=>res(false);
      rq.onblocked = ()=>res(false);
    }catch(e){ res(false); }
  });
}
function idbPut(rec){ if(!idbOK) return; try{ db.transaction('photos','readwrite').objectStore('photos').put(rec); }catch(e){} }
function idbDel(id){ if(!idbOK) return; try{ db.transaction('photos','readwrite').objectStore('photos').delete(id); }catch(e){} }
function idbClear(){ if(!idbOK) return; try{ db.transaction('photos','readwrite').objectStore('photos').clear(); }catch(e){} }
function idbLoadAll(){
  return new Promise(res=>{
    if(!idbOK) return res([]);
    try{
      const rq = db.transaction('photos','readonly').objectStore('photos').getAll();
      rq.onsuccess = ()=>res(rq.result||[]); rq.onerror = ()=>res([]);
    }catch(e){ res([]); }
  });
}

/* ───────── 학교 정보 ───────── */
const $ = id=>document.getElementById(id);
function loadMeta(){
  let m = {};
  try{ m = JSON.parse(localStorage.getItem('school_meta')||'{}'); }catch(e){}
  const now = new Date();
  $('schNum').value  = m.num  ?? '';
  $('schName').value = m.name ?? '';
  $('schM').value = m.m ?? (now.getMonth()+1);
  $('schD').value = m.d ?? now.getDate();
  $('schH').value = m.h ?? now.getHours();
}
function saveMeta(){
  const m = {num:$('schNum').value, name:$('schName').value, m:$('schM').value, d:$('schD').value, h:$('schH').value};
  try{ localStorage.setItem('school_meta', JSON.stringify(m)); }catch(e){}
  $('folderPreview').textContent = '폴더명: ' + schoolFolderName();
}
function schoolFolderName(){
  const num = $('schNum').value.trim();
  const name = $('schName').value.trim() || '학교명미입력';
  return (num? num+'_':'') + name + '(' + ($('schM').value||'?') + '월' + ($('schD').value||'?') + '일 ' + ($('schH').value||'?') + '시)';
}
['schNum','schName','schM','schD','schH'].forEach(id=>$(id).addEventListener('input', saveMeta));

/* ───────── 홈 화면 ───────── */
function renderHome(){
  const grid = $('folderGrid'); grid.innerHTML='';
  let total = 0;
  FOLDERS.forEach(f=>{
    const n = photos.filter(p=>p.fid===f.id).length; total += n;
    const b = document.createElement('button');
    b.className = 'fbtn' + (f.wide?' wide':'') + (n>0?' has':'');
    b.innerHTML = f.label + '<span class="badge">'+n+'</span>';
    b.onclick = ()=>openFolder(f.id);
    grid.appendChild(b);
  });
  $('totalCnt').textContent = total;
}

/* ───────── 폴더 화면 ───────── */
function openFolder(fid){
  curFolder = fid;
  $('homeView').style.display='none';
  $('folderView').style.display='block';
  $('fTitle').textContent = FLABEL[fid];
  $('fHint').textContent = fid.startsWith('h')
    ? '※ 1번째 사진 = 후드 전경(00번), 2번째부터 = 풍속 측정값(01번~). 잘못 찍으면 ✕로 지우고 다시 촬영하세요.'
    : (fid==='doc' ? '※ 수기 점검기록지를 또렷하게(그림자 없이) 촬영하세요. 여러 장 가능.'
                   : '※ 급식실 전경·배기 스티커 등 기본 사진을 촬영하세요.');
  renderFolder();
  window.scrollTo(0,0);
}
function goHome(){
  curFolder = null;
  $('folderView').style.display='none';
  $('homeView').style.display='block';
  renderHome();
}
function folderPhotos(fid){ return photos.filter(p=>p.fid===fid).sort((a,b)=>a.seq-b.seq); }
function renderFolder(){
  const list = folderPhotos(curFolder);
  $('fCnt').textContent = list.length;
  const tdiv = $('thumbs'); tdiv.innerHTML='';
  list.forEach((p,i)=>{
    if(!thumbURL[p.id]) thumbURL[p.id] = URL.createObjectURL(p.blob);
    const d = document.createElement('div'); d.className='th';
    const tag = curFolder.startsWith('h') ? String(i).padStart(2,'0') : (i+1)+'번';
    d.innerHTML = '<img src="'+thumbURL[p.id]+'"><span class="no">'+tag+'</span>';
    const del = document.createElement('button'); del.className='del'; del.textContent='✕';
    del.onclick = ()=>{ if(confirm(tag+' 사진을 삭제할까요?')) removePhoto(p.id); };
    d.appendChild(del);
    tdiv.appendChild(d);
  });
}

/* ───────── 내장 카메라 (연속촬영, HTTPS 필요) ───────── */
let stream=null, camTrack=null, imgCap=null, hiQ=false, torchOn=false, wakeLock=null;
let zoomCaps=null, curZoom=1, backCams=[], sndOn=true;
let mainDevId=null, curDevId=null, onAltLens=false;
let uwDevId=null; try{ uwDevId = localStorage.getItem('cam_uw_dev')||null; }catch(e){}
/* FULL = 이 폰 화면과 똑같은 비율(화면 꽉 참) */
const SCR_R = (()=>{ try{ const w=screen.width||16, h=screen.height||9; return Math.max(w,h)/Math.min(w,h); }catch(e){ return 2.1645; } })();
const ASPECTS=[{id:'full',label:'FULL',r:4000/1848,fw:4000,fh:1848},{id:'wide',label:'16:9',r:16/9},{id:'std',label:'4:3',r:4/3}];
let aspectIdx=(()=>{ try{ const s=localStorage.getItem('cam_aspect_v7'); const i=ASPECTS.findIndex(a=>a.id===s); return i<0?0:i; }catch(e){ return 0; } })();
try{ sndOn = localStorage.getItem('cam_snd')!=='0'; }catch(e){}

function camSupported(){
  return window.isSecureContext && navigator.mediaDevices && navigator.mediaDevices.getUserMedia;
}
async function openCamera(){ return openCameraDev(null); }
async function openCameraDev(devId){
  if(!camSupported()){ $('camInput').value=''; $('camInput').click(); return; }
  const base = devId ? {deviceId:{exact:devId}} : {facingMode:{ideal:'environment'}};
  const vidC = { ...base, width:{ideal:4096}, height:{ideal:3072} };
  try{
    stream = await navigator.mediaDevices.getUserMedia({ video: vidC, audio: true });   // 마이크 동시 확보(소리촬영용)
  }catch(e0){
    try{
      stream = await navigator.mediaDevices.getUserMedia({ video: vidC, audio: false });
    }catch(e){
      if(devId){ toast('렌즈 전환 실패 — 기본 렌즈로 복귀'); openCameraDev(null); return; }
      $('camInput').value=''; $('camInput').click(); return;
    }
  }
  camTrack = stream.getVideoTracks()[0];
  imgCap = (window.ImageCapture && camTrack) ? new ImageCapture(camTrack) : null;
  $('camVideo').srcObject = stream;
  $('camView').style.display='flex';
  $('lastTh').src=''; torchOn=false;
  try{ curDevId = (camTrack.getSettings && camTrack.getSettings().deviceId) || devId || null; }catch(e){ curDevId = devId||null; }
  if(!devId && !mainDevId) mainDevId = curDevId;
  onAltLens = !!(mainDevId && curDevId && curDevId !== mainDevId);
  try{
    const caps = camTrack.getCapabilities ? camTrack.getCapabilities() : {};
    $('torchBtn').style.display = caps.torch ? 'block' : 'none';
    zoomCaps = caps.zoom ? {min:caps.zoom.min, max:caps.zoom.max} : null;
  }catch(e){ $('torchBtn').style.display='none'; zoomCaps=null; }
  curZoom = 1; digiZoom = 1;
  $('camVideo').style.transform = '';
  if(zoomCaps && !onAltLens) setZoom(1, true);
  if(!backCams.length){
    try{
      const ds = await navigator.mediaDevices.enumerateDevices();
      backCams = ds.filter(d=>d.kind==='videoinput' && !/front|user|전면/i.test(d.label||''));
    }catch(e){ backCams=[]; }
  }
  renderZoomBar();
  updateCamHead();
  startMediaSession();
  try{ if(navigator.wakeLock) wakeLock = await navigator.wakeLock.request('screen'); }catch(e){}
}
async function swapTo(devId){ stopTracks(); await openCameraDev(devId); }
function saveUW(id){ uwDevId=id; try{ localStorage.setItem('cam_uw_dev', id); }catch(e){} }
function stopTracks(){
  if(stream){ stream.getTracks().forEach(t=>t.stop()); stream=null; camTrack=null; imgCap=null; }
}
function closeCam(){
  stopTracks();
  stopMediaSession();
  stopMic();
  intOn=false; if(intTimer){ clearTimeout(intTimer); intTimer=null; }
  if(wakeLock){ try{ wakeLock.release(); }catch(e){} wakeLock=null; }
  $('camView').style.display='none';
  if(curFolder) renderFolder();
}
/* 0.6× 초광각: ① 메인렌즈가 0.6 줌을 지원하면 줌으로
   ② 아니면 보조(초광각) 렌즈로 전환 — 한 번 찾으면 기억해서 다음부턴 즉시 전환
   ③ 전환했는데 안 넓어졌으면 0.6×를 다시 눌러 다음 렌즈 시도 */
async function handle06(){
  if(onAltLens){
    const alts = backCams.filter(d=>d.deviceId !== mainDevId);
    if(alts.length < 2){ toast('이 폰이 제공하는 보조 렌즈는 이것뿐입니다'); return; }
    const i = alts.findIndex(d=>d.deviceId === curDevId);
    const next = alts[(i+1) % alts.length];
    await swapTo(next.deviceId);
    saveUW(next.deviceId);
    toast('렌즈 시도 — 가장 넓게 보이면 그대로 쓰세요');
    return;
  }
  if(zoomCaps && zoomCaps.min <= 0.65){ setZoom(0.6); return; }
  let target = (uwDevId && backCams.some(d=>d.deviceId===uwDevId)) ? uwDevId
             : (backCams.find(d=>d.deviceId !== mainDevId) || {}).deviceId;
  if(!target){ toast('이 폰은 초광각 렌즈를 웹앱에 제공하지 않습니다'); return; }
  await swapTo(target);
  saveUW(target);
  toast('0.6× 초광각 — 안 넓어졌으면 0.6×를 한 번 더 누르세요');
}

let digiZoom = 1;
async function setZoom(z, silent){
  if(!camTrack) return;
  let applied = false;
  if(zoomCaps){
    const v = Math.min(Math.max(z, zoomCaps.min), zoomCaps.max);
    try{ await camTrack.applyConstraints({advanced:[{zoom:v}]}); if(v >= z*0.95) applied = true; }catch(e){}
  }
  const vd = $('camVideo');
  if(applied || z <= 1){
    digiZoom = 1; vd.style.transform = '';
  }else{
    if(zoomCaps){ try{ camTrack.applyConstraints({advanced:[{zoom: Math.max(1, zoomCaps.min)}]}); }catch(e){} }
    digiZoom = z;                                   // 디지털 줌: 프리뷰 확대 + 촬영 시 중앙 크롭
    vd.style.transformOrigin = 'center center';
    vd.style.transform = 'scale(' + z + ')';
  }

}

/* ── 📢 소리 촬영: 박수·"찍어" 같은 큰 소리에 셔터 ── */
let micOn=false, micStream=null, micCtx=null, micAnalyser=null, micRAF=null, lastSnapAt=0, micArmAt=0;
let micOwn = false;
async function toggleMic(){
  if(micOn){ stopMic(); renderZoomBar(); toast('소리 촬영 OFF'); return; }
  micOwn = false;
  const atks = (stream && stream.getAudioTracks) ? stream.getAudioTracks() : [];
  if(atks.length && atks[0].readyState === 'live'){
    micStream = new MediaStream([atks[0]]);          // 카메라와 함께 확보한 마이크 트랙 재사용
  }else{
    try{
      micStream = await navigator.mediaDevices.getUserMedia({audio:true});
      micOwn = true;
    }catch(e){
      toast('마이크 사용 불가(' + ((e && e.name) || '오류') + ') — 카메라를 닫았다 다시 열어주세요');
      return;
    }
  }
  try{
    micCtx = new (window.AudioContext||window.webkitAudioContext)();
    const src = micCtx.createMediaStreamSource(micStream);
    micAnalyser = micCtx.createAnalyser(); micAnalyser.fftSize = 512;
    src.connect(micAnalyser);
  }catch(e){ stopMic(); toast('마이크 초기화 실패'); return; }
  micOn = true; micArmAt = Date.now() + 1000;
  const data = new Uint8Array(micAnalyser.fftSize);
  const loop = ()=>{
    if(!micOn) return;
    micAnalyser.getByteTimeDomainData(data);
    let peak = 0;
    for(let i=0;i<data.length;i++){ const v = Math.abs(data[i]-128); if(v>peak) peak = v; }
    if(peak > 62 && Date.now() > micArmAt){ micArmAt = Date.now() + 2500; snap(); }   // 감지 즉시 2.5초 잠금 → 1장만
    micRAF = requestAnimationFrame(loop);
  };
  loop();
  renderZoomBar();
  toast('소리 촬영 ON — 박수 치거나 크게 외치면 찍힙니다');
}
function stopMic(){
  micOn = false;
  if(micRAF){ cancelAnimationFrame(micRAF); micRAF=null; }
  try{ if(micOwn && micStream) micStream.getTracks().forEach(t=>t.stop()); }catch(e){}
  micStream=null; micOwn=false;
  try{ micCtx && micCtx.close(); }catch(e){}
  micCtx=null; micAnalyser=null;
}

/* ── ⏱ 3초 자동촬영: 1초마다 틱 → 3초마다 한 장 ── */
let intOn=false, intTimer=null;
function tickSound(){
  try{
    audioCtx = audioCtx || new (window.AudioContext||window.webkitAudioContext)();
    if(audioCtx.state==='suspended') audioCtx.resume();
    const t=audioCtx.currentTime;
    const o=audioCtx.createOscillator(), g=audioCtx.createGain();
    o.type='sine'; o.frequency.value=1000;
    g.gain.setValueAtTime(0.35,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.05);
    o.connect(g); g.connect(audioCtx.destination); o.start(t); o.stop(t+0.06);
  }catch(e){}
}
function toggleInterval(){
  intOn = !intOn;
  if(intOn){ toast('3초 간격 자동촬영 ON'); intTick(3); }
  else { clearTimeout(intTimer); intTimer=null; toast('자동촬영 OFF'); }
  renderZoomBar();
}
function intTick(n){
  if(!intOn || !stream) { intOn=false; renderZoomBar(); return; }
  if(n > 0){ tickSound(); intTimer = setTimeout(()=>intTick(n-1), 1000); }
  else { snap(); intTimer = setTimeout(()=>intTick(3), 1000); }
}

/* ── 촬영 (비율 크롭 + 소리) ── */
let snapBusy=false;
function cropRect(w,h,ratio){
  const land = w >= h; let tw, th;
  if(land){ if(w/h >= ratio){ th=h; tw=Math.round(h*ratio); } else { tw=w; th=Math.round(w/ratio); } }
  else    { if(h/w >= ratio){ tw=w; th=Math.round(w*ratio); } else { th=h; tw=Math.round(h/ratio); } }
  return {tw, th, sx:(w-tw)>>1, sy:(h-th)>>1};
}
function srcToBlob(src, w, h, ratio){
  const {tw,th,sx,sy} = cropRect(w,h,ratio);
  const c = document.createElement('canvas'); c.width=tw; c.height=th;
  c.getContext('2d').drawImage(src, sx, sy, tw, th, 0, 0, tw, th);
  return new Promise(r=>c.toBlob(r,'image/jpeg',0.92));
}
/* ── 기기 실제 방향: 화면회전 + (회전잠금 대비) 중력센서 ── */
let gAccX = 0, gAccY = 0;
window.addEventListener('devicemotion', e=>{
  const a = e.accelerationIncludingGravity; if(!a) return;
  gAccX = gAccX*0.7 + (a.x||0)*0.3;
  gAccY = gAccY*0.7 + (a.y||0)*0.3;
});
function calcRot(w, h){
  if(w >= h) return 0;                                   // 프레임이 이미 가로
  const ang = (screen.orientation && screen.orientation.angle) || 0;
  if(ang === 90 || ang === 270) return ang;              // 화면이 실제로 회전한 경우
  if(Math.abs(gAccX) > 5 && Math.abs(gAccX) > Math.abs(gAccY)) return gAccX > 0 ? 90 : 270; // 회전잠금: 센서 판정
  return 0;
}
function rotateFrame(src, w, h, ang){
  const c = document.createElement('canvas');
  c.width = h; c.height = w;
  const x = c.getContext('2d');
  if(ang === 90){ x.translate(0, w); x.rotate(-Math.PI/2); }
  else          { x.translate(h, 0); x.rotate( Math.PI/2); }
  x.drawImage(src, 0, 0);
  return c;
}
/* ── 백그라운드 인코딩 워커 (셔터 즉시 → 저장은 뒤에서) ── */
let encWorker = null, encOK = false;
const pendingShots = {};   // id -> {fid, ts, seq}
function pendCount(fid){ let n=0; for(const k in pendingShots) if(pendingShots[k].fid===fid) n++; return n; }
function initWorker(){
  if(encWorker !== null) return;
  try{
    if(typeof OffscreenCanvas === 'undefined' || !OffscreenCanvas.prototype.convertToBlob){ encWorker = false; return; }
    const src = `self.onmessage = async e => {
      const d = e.data;
      try{
        let rw = d.W, rh = d.H, srcC = d.bmp;
        if(d.rot === 90 || d.rot === 270){
          rw = d.H; rh = d.W;
          const t = new OffscreenCanvas(rw, rh);
          const tx = t.getContext('2d');
          if(d.rot === 90){ tx.translate(0, rh); tx.rotate(-Math.PI/2); }
          else            { tx.translate(rw, 0); tx.rotate( Math.PI/2); }
          tx.drawImage(d.bmp, 0, 0);
          srcC = t;
        }
        const land = rw >= rh; let tw, th;
        if(land){ if(rw/rh >= d.ratio){ th=rh; tw=Math.round(rh*d.ratio); } else { tw=rw; th=Math.round(rw/d.ratio); } }
        else    { if(rh/rw >= d.ratio){ tw=rw; th=Math.round(rw*d.ratio); } else { th=rh; tw=Math.round(rh/d.ratio); } }
        let sx=(rw-tw)>>1, sy=(rh-th)>>1, cw=tw, ch=th;
        if(d.dz > 1){
          const nw = Math.round(tw/d.dz), nh = Math.round(th/d.dz);
          sx += (tw-nw)>>1; sy += (th-nh)>>1; cw = nw; ch = nh;
        }
        let ow = cw, oh = ch;
        if(d.fw){ ow = land ? d.fw : d.fh; oh = land ? d.fh : d.fw; }
        const out = new OffscreenCanvas(ow, oh);
        out.getContext('2d').drawImage(srcC, sx, sy, cw, ch, 0, 0, ow, oh);
        if(d.bmp.close) d.bmp.close();
        const blob = await out.convertToBlob({type:'image/jpeg', quality:0.88});
        self.postMessage({id:d.id, blob:blob});
      }catch(err){ self.postMessage({id:d.id, blob:null}); }
    };`;
    encWorker = new Worker(URL.createObjectURL(new Blob([src], {type:'text/javascript'})));
    encWorker.onmessage = ev => finishShot(ev.data.id, ev.data.blob);
    encOK = true;
  }catch(e){ encWorker = false; encOK = false; }
}
function finishShot(id, blob){
  const meta = pendingShots[id]; delete pendingShots[id];
  if(!meta){ return; }
  if(!blob){ toast('1장 저장 실패'); updateCamHead(); return; }
  const rec = {id: Date.now()+'_'+Math.random().toString(36).slice(2,8), fid:meta.fid, ts:meta.ts, seq:meta.seq, blob};
  photos.push(rec); idbPut(rec);
  if($('camView').style.display==='flex' && curFolder===meta.fid) $('lastTh').src = URL.createObjectURL(blob);
  updateCamHead();
  if($('folderView').style.display!=='none' && $('camView').style.display!=='flex' && curFolder===meta.fid) renderFolder();
}
async function snap(){
  if(!stream || snapBusy) return;
  snapBusy = true; setTimeout(()=>snapBusy=false, 200);
  const v = $('camVideo');
  if(!v.videoWidth){ snapBusy=false; toast('카메라 준비 중…'); return; }
  // ① 즉각 피드백
  lastSnapAt = Date.now(); micArmAt = Date.now() + 1500;
  if(sndOn) shutterSound();
  const fx = $('flashFx'); fx.style.opacity='0.7'; setTimeout(()=>fx.style.opacity='0', 120);
  try{ navigator.vibrate && navigator.vibrate(40); }catch(e){}
  const ratio = ASPECTS[aspectIdx].r;
  const meta = {fid: curFolder, ts: Date.now(), seq: seqCounter++};
  initWorker();
  // ② 비트맵만 빠르게 떠서 워커로 전달 → 회전·자르기·압축·저장은 백그라운드
  if(encOK){
    let bmp = null;
    if(hiQ && imgCap){
      try{
        const pb = await imgCap.takePhoto();
        try{ bmp = await createImageBitmap(pb, {imageOrientation:'from-image'}); }
        catch(e){ bmp = await createImageBitmap(pb); }
      }catch(e){ bmp = null; }
    }
    if(!bmp){ try{ bmp = await createImageBitmap(v); }catch(e){ bmp = null; } }
    if(bmp){
      const rot = calcRot(bmp.width, bmp.height);
      const id = 'p' + meta.seq;
      pendingShots[id] = meta;
      updateCamHead();
      const A = ASPECTS[aspectIdx];
      encWorker.postMessage({id, bmp, rot, ratio, dz:(onAltLens?1:digiZoom), fw:(A.fw||0), fh:(A.fh||0), W:bmp.width, H:bmp.height}, [bmp]);
      return;
    }
  }
  // ③ 예비 경로 (워커 미지원 기기)
  const rot = calcRot(v.videoWidth, v.videoHeight);
  let srcEl = v, sw = v.videoWidth, sh = v.videoHeight;
  if(rot){ srcEl = rotateFrame(v, sw, sh, rot); sw = srcEl.width; sh = srcEl.height; }
  const blob = await srcToBlob(srcEl, sw, sh, ratio);
  if(!blob){ toast('촬영 실패 — 다시 눌러주세요'); return; }
  photos.push({id: Date.now()+'_'+Math.random().toString(36).slice(2,8), fid:meta.fid, ts:meta.ts, seq:meta.seq, blob});
  idbPut(photos[photos.length-1]);
  $('lastTh').src = URL.createObjectURL(blob);
  updateCamHead();
}

/* ── 셔터음: 실제 카메라 "찰칵" 기계음 (노이즈 2연타), 최대 음량 ──
   ※ 실제 크기는 폰의 미디어 볼륨을 따릅니다 */
let audioCtx=null;
function shutterBurst(ctx, at, dur, hp, lp, vol){
  const n = Math.max(1, Math.floor(ctx.sampleRate * dur));
  const buf = ctx.createBuffer(1, n, ctx.sampleRate);
  const d = buf.getChannelData(0);
  for(let i=0;i<n;i++){ const e = Math.pow(1 - i/n, 2.2); d[i] = (Math.random()*2-1) * e; }
  const src = ctx.createBufferSource(); src.buffer = buf;
  const hpf = ctx.createBiquadFilter(); hpf.type='highpass'; hpf.frequency.value=hp;
  const lpf = ctx.createBiquadFilter(); lpf.type='lowpass';  lpf.frequency.value=lp;
  const g = ctx.createGain(); g.gain.value = vol;
  src.connect(hpf); hpf.connect(lpf); lpf.connect(g); g.connect(ctx.destination);
  src.start(ctx.currentTime + at);
}
function shutterSound(){
  try{
    audioCtx = audioCtx || new (window.AudioContext||window.webkitAudioContext)();
    if(audioCtx.state==='suspended') audioCtx.resume();
    shutterBurst(audioCtx, 0,     0.028, 2200, 9500, 1.0);  // '찰' (날카로운 클릭)
    shutterBurst(audioCtx, 0.052, 0.050, 700,  4500, 1.0);  // '칵' (낮고 둔탁한 클릭)
  }catch(e){}
}

/* ── 블루투스 리모컨(셀카봉) 셔터 ──
   ① 키보드형 리모컨: Enter/Space/볼륨키 keydown
   ② 미디어버튼형 리모컨: 무음 오디오 재생 + Media Session 핸들러
   ※ 볼륨키 전용 리모컨은 안드로이드가 신호를 웹앱에 주지 않아 동작하지 않습니다 */
/* ── APK(네이티브 앱) 연동 훅: 볼륨키 셔터 / 뒤로가기 ── */
window.__btShutter = function(){ if($('camView').style.display==='flex') snap(); };
window.__btBack = function(){
  if($('camView').style.display==='flex'){ closeCam(); return 'handled'; }
  if($('folderView').style.display!=='none'){ goHome(); return 'handled'; }
  return 'exit';
};
window.addEventListener('keydown', e=>{
  if($('camView').style.display!=='flex') return;
  const k=e.key||'', c=e.code||'', kc=e.keyCode||0;
  if(k==='Enter'||k===' '||c==='Enter'||c==='NumpadEnter'||c==='Space'
     ||/AudioVolume(Up|Down)/i.test(k)||/Volume(Up|Down)/i.test(c)||kc===24||kc===25){
    e.preventDefault(); snap();
  }
});
let silentAudio=null;
function makeSilentWav(){
  const sr=8000, n=sr;
  const buf=new ArrayBuffer(44+n*2); const v=new DataView(buf);
  const ws=(o,s)=>{ for(let i=0;i<s.length;i++) v.setUint8(o+i, s.charCodeAt(i)); };
  ws(0,'RIFF'); v.setUint32(4,36+n*2,true); ws(8,'WAVE'); ws(12,'fmt ');
  v.setUint32(16,16,true); v.setUint16(20,1,true); v.setUint16(22,1,true);
  v.setUint32(24,sr,true); v.setUint32(28,sr*2,true); v.setUint16(32,2,true); v.setUint16(34,16,true);
  ws(36,'data'); v.setUint32(40,n*2,true);
  return new Blob([buf],{type:'audio/wav'});
}
function startMediaSession(){
  try{
    if(!silentAudio){
      silentAudio = new Audio(URL.createObjectURL(makeSilentWav()));
      silentAudio.loop = true; silentAudio.volume = 0.05;
    }
    silentAudio.play().catch(()=>{});
    if('mediaSession' in navigator){
      try{ navigator.mediaSession.metadata = new MediaMetadata({title:'환기사진 촬영 중'}); }catch(e){}
      ['play','pause','stop','nexttrack','previoustrack','seekforward','seekbackward'].forEach(a=>{
        try{ navigator.mediaSession.setActionHandler(a, ()=>{ snap(); try{ silentAudio.play().catch(()=>{}); }catch(e){} }); }catch(e){}
      });
    }
  }catch(e){}
}
function stopMediaSession(){
  try{ if(silentAudio) silentAudio.pause(); }catch(e){}
}

  if(document.hidden && stream) closeCam();
});

/* ───────── 기본 카메라(예비) / 갤러리 ───────── */
function openGallery(){ $('galInput').value=''; $('galInput').click(); }
$('camInput').addEventListener('change', e=>{
  const f = e.target.files && e.target.files[0];
  if(!f || !curFolder) return;
  addPhoto(curFolder, f, Date.now());
  renderFolder();
  $('ovInfo').textContent = FLABEL[curFolder] + ' · 현재 ' + folderPhotos(curFolder).length + '장';
  $('overlay').style.display='flex';
});
$('galInput').addEventListener('change', e=>{
  const fs = Array.from(e.target.files||[]);
  if(!fs.length || !curFolder) return;
  fs.sort((a,b)=>(a.lastModified||0)-(b.lastModified||0));
  fs.forEach(f=>addPhoto(curFolder, f, f.lastModified||Date.now()));
  renderFolder();
  toast(fs.length+'장 추가됨');
});
function hideOverlay(){ $('overlay').style.display='none'; }

function addPhoto(fid, blob, ts){
  const rec = {id: Date.now()+'_'+Math.random().toString(36).slice(2,8), fid, ts, seq: seqCounter++, blob};
  photos.push(rec);
  idbPut(rec);
}
function removePhoto(id){
  photos = photos.filter(p=>p.id!==id);
  if(thumbURL[id]){ URL.revokeObjectURL(thumbURL[id]); delete thumbURL[id]; }
  idbDel(id);
  renderFolder();
}
function resetAll(){
  const total = photos.length;
  if(!total){ toast('사진이 없습니다'); return; }
  if(!confirm('사진 '+total+'장을 모두 삭제하고 새 학교를 시작할까요?')) return;
  if(!confirm('정말 삭제합니다. ZIP 내보내기는 하셨나요?')) return;
  photos.forEach(p=>{ if(thumbURL[p.id]){URL.revokeObjectURL(thumbURL[p.id]); delete thumbURL[p.id];} });
  photos = []; idbClear(); renderHome(); toast('전체 삭제 완료');
}

/* ───────── 파일명 ───────── */
function pad(n,len){ return String(n).padStart(len,'0'); }
function tsName(ts){
  const d = new Date(ts);
  return ''+d.getFullYear()+pad(d.getMonth()+1,2)+pad(d.getDate(),2)+'_'+pad(d.getHours(),2)+pad(d.getMinutes(),2)+pad(d.getSeconds(),2);
}
function extOf(blob){
  const t = (blob.type||'').toLowerCase();
  if(t.includes('png')) return '.png';
  return '.jpg';
}

/* ───────── ZIP (STORE, UTF-8 파일명) ───────── */
const CRC_TABLE = (()=>{ const t=new Uint32Array(256);
  for(let i=0;i<256;i++){ let c=i; for(let k=0;k<8;k++) c = (c&1)?(0xEDB88320^(c>>>1)):(c>>>1); t[i]=c>>>0; }
  return t; })();
function crcUpdate(buf, crc){
  for(let i=0;i<buf.length;i++) crc = CRC_TABLE[(crc^buf[i])&0xFF] ^ (crc>>>8);
  return crc;
}
function dosDT(d){
  const time = ((d.getHours()<<11)|(d.getMinutes()<<5)|(d.getSeconds()>>1)) & 0xFFFF;
  const date = (((Math.max(d.getFullYear(),1980)-1980)<<9)|((d.getMonth()+1)<<5)|d.getDate()) & 0xFFFF;
  return {time,date};
}
async function buildZip(entries, onProg){
  const enc = new TextEncoder();
  const parts = [], central = [];
  let offset = 0;
  for(let fi=0; fi<entries.length; fi++){
    const en = entries[fi];
    const nameB = enc.encode(en.path);
    const data = new Uint8Array(await en.blob.arrayBuffer());
    let crc = 0xFFFFFFFF;
    const CHUNK = 1<<20;
    for(let p=0; p<data.length; p+=CHUNK){
      crc = crcUpdate(data.subarray(p, Math.min(p+CHUNK, data.length)), crc);
    }
    crc = (crc ^ 0xFFFFFFFF) >>> 0;
    const size = en.blob.size;
    const {time,date} = dosDT(new Date(en.ts||Date.now()));
    const lh = new DataView(new ArrayBuffer(30));
    lh.setUint32(0,0x04034b50,true); lh.setUint16(4,20,true); lh.setUint16(6,0x0800,true);
    lh.setUint16(8,0,true); lh.setUint16(10,time,true); lh.setUint16(12,date,true);
    lh.setUint32(14,crc,true); lh.setUint32(18,size,true); lh.setUint32(22,size,true);
    lh.setUint16(26,nameB.length,true); lh.setUint16(28,0,true);
    parts.push(new Uint8Array(lh.buffer), nameB, en.blob);
    const ch = new DataView(new ArrayBuffer(46));
    ch.setUint32(0,0x02014b50,true); ch.setUint16(4,20,true); ch.setUint16(6,20,true);
    ch.setUint16(8,0x0800,true); ch.setUint16(10,0,true); ch.setUint16(12,time,true); ch.setUint16(14,date,true);
    ch.setUint32(16,crc,true); ch.setUint32(20,size,true); ch.setUint32(24,size,true);
    ch.setUint16(28,nameB.length,true); ch.setUint32(42,offset,true);
    central.push(new Uint8Array(ch.buffer), nameB);
    offset += 30 + nameB.length + size;
    if(onProg) onProg((fi+1)/entries.length);
    await new Promise(r=>setTimeout(r));
  }
  let cdSize = 0; central.forEach(u=>cdSize+=u.length);
  const eo = new DataView(new ArrayBuffer(22));
  eo.setUint32(0,0x06054b50,true);
  eo.setUint16(8,entries.length,true); eo.setUint16(10,entries.length,true);
  eo.setUint32(12,cdSize,true); eo.setUint32(16,offset,true);
  return new Blob([...parts, ...central, new Uint8Array(eo.buffer)], {type:'application/zip'});
}

/* ───────── 내보내기 ───────── */
function buildEntries(){
  const root = schoolFolderName();
  const entries = [];
  const used = new Set();
  function uniq(path){
    if(!used.has(path)){ used.add(path); return path; }
    let i=1, p;
    const dot = path.lastIndexOf('.');
    do{ p = path.slice(0,dot)+'_'+(i++)+path.slice(dot); }while(used.has(p));
    used.add(p); return p;
  }
  folderPhotos('doc').forEach(p=>entries.push({path: uniq(root+'/'+tsName(p.ts)+extOf(p.blob)), blob:p.blob, ts:p.ts}));
  folderPhotos('base').forEach(p=>entries.push({path: uniq(root+'/기본 사진/'+tsName(p.ts)+extOf(p.blob)), blob:p.blob, ts:p.ts}));
  for(let i=1;i<=15;i++){
    folderPhotos('h'+i).forEach((p,idx)=>entries.push({path: uniq(root+'/후드'+i+' 사진/'+pad(idx,2)+extOf(p.blob)), blob:p.blob, ts:p.ts}));
  }
  return entries;
}
async function exportZip(share){
  if(typeof pendingShots !== 'undefined' && Object.keys(pendingShots).length){ toast('사진 저장 마무리 중… 2초 후 다시 눌러주세요'); return; }
  if(!photos.length){ alert('저장된 사진이 없습니다.'); return; }
  if(!$('schName').value.trim()){ alert('학교명을 입력해 주세요.'); $('schName').focus(); return; }
  const entries = buildEntries();
  $('prog').style.display='flex'; $('progMsg').textContent='ZIP 만드는 중… ('+entries.length+'장)';
  try{
    const zip = await buildZip(entries, r=>{ $('pfill').style.width = Math.round(r*100)+'%'; });
    const fname = schoolFolderName()+'.zip';
    if(window.HwangiBridge){   // APK 안에서는 네이티브 브리지로 다운로드 폴더에 저장
      $('progMsg').textContent='파일 저장 중…';
      const CH = 3*1024*1024;
      HwangiBridge.start(fname);
      for(let p=0; p<zip.size; p+=CH){
        const buf = new Uint8Array(await zip.slice(p, Math.min(p+CH, zip.size)).arrayBuffer());
        let bin=''; const SUB=32768;
        for(let q=0; q<buf.length; q+=SUB) bin += String.fromCharCode.apply(null, buf.subarray(q, Math.min(q+SUB, buf.length)));
        HwangiBridge.append(btoa(bin));
        $('pfill').style.width = Math.round(100*Math.min(p+CH,zip.size)/zip.size)+'%';
        await new Promise(r=>setTimeout(r));
      }
      HwangiBridge.finish();
      $('prog').style.display='none';
      if(share && HwangiBridge.share){ try{ HwangiBridge.share(); }catch(e){} toast('공유할 앱을 선택하세요'); }
      else toast('다운로드 폴더에 저장: '+fname);
      return;
    }
    if(share && navigator.canShare){
      const file = new File([zip], fname, {type:'application/zip'});
      if(navigator.canShare({files:[file]})){
        $('prog').style.display='none';
        await navigator.share({files:[file], title:fname}).catch(()=>{});
        return;
      }
    }
    const a = document.createElement('a');
    a.href = URL.createObjectURL(zip); a.download = fname;
    document.body.appendChild(a); a.click();
    setTimeout(()=>{ URL.revokeObjectURL(a.href); a.remove(); }, 4000);
    $('prog').style.display='none';
    toast('다운로드 폴더에 저장: '+fname);
  }catch(err){
    $('prog').style.display='none';
    alert('내보내기 실패: '+err);
  }
}

async function doInstall(){

  deferredPrompt.prompt();
  await deferredPrompt.userChoice.catch(()=>{});
  deferredPrompt = null;
  $('installBar').style.display='none';
}
window.addEventListener('appinstalled', ()=>{ $('installBar').style.display='none'; toast('앱 설치 완료!'); });
if('serviceWorker' in navigator && location.protocol === 'https:'){
  navigator.serviceWorker.register('./sw.js').catch(()=>{});
}

let toastTimer = null;
function toast(msg){
  const t = $('toast'); t.textContent = msg; t.style.display='block';
  clearTimeout(toastTimer); toastTimer = setTimeout(()=>t.style.display='none', 2200);
}
window.addEventListener('beforeunload', e=>{
  if(photos.length && !idbOK){ e.preventDefault(); e.returnValue=''; }
});

(async function init(){
  loadMeta(); saveMeta();
  const ok = await openDB();
  if(ok){
    const recs = await idbLoadAll();
    recs.sort((a,b)=>a.seq-b.seq);
    photos = recs;
    seqCounter = recs.length ? Math.max(...recs.map(r=>r.seq||0))+1 : 1;
  }else{
    $('storeBanner').style.display='block';
  }
  renderHome();
})();
