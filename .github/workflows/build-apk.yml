name: build-apk
on:
  workflow_dispatch:
  push:
    paths:
      - 'android/**'
      - '.github/workflows/build-apk.yml'
permissions:
  contents: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - name: Add app icons
        run: |
          mkdir -p android/app/src/main/res/mipmap-xhdpi android/app/src/main/res/mipmap-xxxhdpi
          curl -fsSL https://2025mc105-cloud.github.io/kitchen-photo/icon-192.png -o android/app/src/main/res/mipmap-xhdpi/ic_launcher.png
          curl -fsSL https://2025mc105-cloud.github.io/kitchen-photo/icon-512.png -o android/app/src/main/res/mipmap-xxxhdpi/ic_launcher.png
      - name: Gradle wrapper 8.7
        run: |
          mkdir -p "$RUNNER_TEMP/wr" && cd "$RUNNER_TEMP/wr"
          echo "rootProject.name='wr'" > settings.gradle
          gradle wrapper --gradle-version 8.7 --no-daemon
          cp -r gradlew gradle "$GITHUB_WORKSPACE/android/"
      - name: Build APK
        run: cd android && ./gradlew assembleDebug --no-daemon
      - name: Rename
        run: cp android/app/build/outputs/apk/debug/app-debug.apk hwangi-photo.apk
      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: apk-v${{ github.run_number }}
          name: 환기사진 앱 빌드 ${{ github.run_number }}
          body: 스마트폰에서 hwangi-photo.apk 를 내려받아 설치하세요.
          files: hwangi-photo.apk
